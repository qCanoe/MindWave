<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTune - Music Therapy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #030712;
            color: #e5e7eb;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        h1, h2, h3, .font-display {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.01em;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-nav {
            background: rgba(3, 7, 18, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        /* Cosmic Animations */
        @keyframes cosmic-ripple {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(3.5); opacity: 0; }
        }
        @keyframes wave-bounce {
            0%, 100% { transform: scaleY(0.4); opacity: 0.6; }
            50% { transform: scaleY(1); opacity: 1; }
        }
    </style>
</head>
<body class="antialiased selection:bg-indigo-500/30 selection:text-indigo-200 overflow-hidden flex flex-col h-screen">

    <!-- Background (component) added by Aura -->
    <div class="aura-background-component fixed top-0 w-full h-screen -z-10" data-alpha-mask="80" style="mask-image: linear-gradient(to bottom, transparent, black 0%, black 80%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 0%, black 80%, transparent)">
        <div class="w-full h-full">
            <div class="w-full h-full relative">
                <div class="aura-background-component top-0 w-full absolute h-full">
                    <div data-us-project="bKN5upvoulAmWvInmHza" class="absolute w-full h-full left-0 top-0"></div>
                    <script type="text/javascript">!function(){if(!window.UnicornStudio){window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v1.4.29/dist/unicornStudio.umd.js",i.onload=function(){window.UnicornStudio.isInitialized||(UnicornStudio.init(),window.UnicornStudio.isInitialized=!0)},(document.head || document.body).appendChild(i)}}();</script>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="w-full z-50 glass-nav transition-all duration-300 flex-shrink-0">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="#" class="flex items-center gap-2 group">
                <div class="w-7 h-7 rounded-lg bg-gradient-to-tr to-indigo-500 flex items-center justify-center from-white shadow-[0_0_15px_rgba(99,102,241,0.3)]">
                    <iconify-icon icon="lucide:waves" class="text-black" width="16"></iconify-icon>
                </div>
                <span class="text-lg font-bold tracking-tight group-hover:opacity-80 transition-opacity text-white font-display">MoodTune</span>
            </a>
            <button class="text-xs font-medium px-4 py-2 rounded-full border transition-colors bg-white/5 border-white/10 text-stone-300 hover:bg-white/10 hover:text-white flex items-center gap-1.5">
                <iconify-icon icon="lucide:rotate-ccw" width="12"></iconify-icon>
                Reset
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto w-full relative z-10 flex flex-col items-center pt-10 pb-40 px-6">
        
        <!-- Intent Input Area -->
        <div class="w-full max-w-3xl mb-12 flex flex-col gap-4">
            <div class="relative flex items-center group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500/20 to-purple-500/20 rounded-2xl blur opacity-0 group-hover:opacity-100 transition duration-500"></div>
                <input type="text" placeholder="Describe how you feel... (e.g., anxious, need focus, can't sleep)" 
                       class="relative w-full bg-stone-900/80 border border-white/10 rounded-2xl py-4 pl-6 pr-32 text-white placeholder:text-stone-500 focus:outline-none focus:border-indigo-500/50 focus:bg-stone-900 transition-all text-base shadow-2xl backdrop-blur-xl">
                <button class="absolute right-2 h-10 px-5 rounded-xl bg-white text-black text-sm font-medium hover:bg-stone-200 transition-colors flex items-center gap-2 shadow-lg">
                    <iconify-icon icon="lucide:sparkles" width="16"></iconify-icon>
                    Apply
                </button>
            </div>
            
            <!-- Interpreting Label -->
            <div class="text-xs text-indigo-300/90 font-medium px-2 flex items-center gap-2">
                <iconify-icon icon="lucide:bot" width="14"></iconify-icon>
                <span class="tracking-wide">Interpreting as: Calm · Warm · Slow · Low density</span>
            </div>

            <!-- Chips -->
            <div class="flex flex-col gap-3 mt-4">
                <!-- Mode -->
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-[10px] text-stone-500 uppercase tracking-[0.2em] font-bold mr-2 w-16">MODE</span>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-indigo-500 bg-indigo-500/20 text-white shadow-[0_0_10px_rgba(99,102,241,0.2)] transition-colors">Focus</button>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 bg-white/5 text-stone-400 hover:bg-white/10 hover:text-white transition-colors">Calm</button>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 bg-white/5 text-stone-400 hover:bg-white/10 hover:text-white transition-colors">Sleep</button>
                </div>
                <!-- Feelings/Intent -->
                <div class="flex items-center gap-2 flex-wrap mt-1">
                    <span class="text-[10px] text-stone-500 uppercase tracking-[0.2em] font-bold mr-2 w-16">FEEL</span>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 bg-white/5 text-stone-400 hover:bg-white/10 hover:text-white transition-colors">Anxious</button>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 bg-white/5 text-stone-400 hover:bg-white/10 hover:text-white transition-colors">Overwhelmed</button>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 bg-white/5 text-stone-400 hover:bg-white/10 hover:text-white transition-colors">Low energy</button>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-indigo-500/50 bg-indigo-500/10 text-indigo-200 transition-colors">Deep work</button>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 bg-white/5 text-stone-400 hover:bg-white/10 hover:text-white transition-colors">Light study</button>
                </div>
                <!-- Environment -->
                <div class="flex items-center gap-2 flex-wrap mt-1">
                    <span class="text-[10px] text-stone-500 uppercase tracking-[0.2em] font-bold mr-2 w-16">ENV</span>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 bg-white/5 text-stone-400 hover:bg-white/10 hover:text-white transition-colors">None</button>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-indigo-500/50 bg-indigo-500/10 text-indigo-200 transition-colors">Rain</button>
                    <button class="px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide border border-white/10 bg-white/5 text-stone-400 hover:bg-white/10 hover:text-white transition-colors">White Noise</button>
                </div>
            </div>
        </div>

        <!-- Player Card -->
        <div class="w-full max-w-md relative group mt-4">
            <!-- Glow effect -->
            <div class="absolute -inset-1 bg-gradient-to-b from-indigo-500/20 to-purple-500/20 rounded-[2.5rem] blur-2xl opacity-60 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none"></div>
            
            <div class="relative glass-panel rounded-[2.5rem] p-8 border border-white/10 shadow-2xl flex flex-col items-center bg-stone-950/60 backdrop-blur-2xl">
                <!-- Top Bar -->
                <div class="w-full flex justify-between items-start mb-12">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-stone-400 uppercase tracking-[0.2em] font-semibold mb-1.5">Playing</span>
                        <h2 class="text-3xl font-bold text-white flex items-center gap-3 font-display">
                            Deep Focus
                            <span class="flex h-2 w-2 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-indigo-400"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                            </span>
                        </h2>
                    </div>
                    <button class="w-9 h-9 rounded-full border border-white/10 bg-white/5 flex items-center justify-center text-stone-400 hover:text-white hover:bg-white/10 transition-colors" title="Regenerate">
                        <iconify-icon icon="lucide:refresh-cw" width="16"></iconify-icon>
                    </button>
                </div>

                <!-- Cosmic Wave Visualizer -->
                <div class="relative w-64 h-64 flex items-center justify-center mb-12">
                    <!-- Static Deep Background Rings (like the image) -->
                    <div class="absolute w-64 h-64 rounded-full bg-[#0a0a14] border border-white/[0.02]"></div>
                    <div class="absolute w-52 h-52 rounded-full bg-[#11101d] border border-white/[0.03]"></div>
                    
                    <!-- Expanding Cosmic Rings -->
                    <div class="absolute w-40 h-40 rounded-full border border-indigo-400/10 bg-indigo-500/5 animate-[cosmic-ripple_7s_ease-out_infinite]"></div>
                    <div class="absolute w-40 h-40 rounded-full border border-indigo-400/10 bg-indigo-500/5 animate-[cosmic-ripple_7s_ease-out_infinite_2.3s]"></div>
                    <div class="absolute w-40 h-40 rounded-full border border-indigo-400/10 bg-indigo-500/5 animate-[cosmic-ripple_7s_ease-out_infinite_4.6s]"></div>
                    
                    <!-- Core Planet/Aura -->
                    <div class="absolute w-40 h-40 rounded-full bg-gradient-to-tr from-[#161427] to-[#1e1b38] shadow-[0_0_50px_rgba(49,46,129,0.5)] flex items-center justify-center z-10 overflow-hidden border border-white/5">
                        <div class="absolute inset-0 rounded-full bg-indigo-400/5 animate-pulse"></div>
                        
                        <!-- Soft Soundwave Bars -->
                        <div class="relative flex items-center gap-1.5 h-16 z-20">
                            <div class="w-1.5 h-6 bg-indigo-400/60 rounded-full animate-[wave-bounce_2.1s_ease-in-out_infinite_0.1s]"></div>
                            <div class="w-1.5 h-10 bg-indigo-400/70 rounded-full animate-[wave-bounce_1.9s_ease-in-out_infinite_0.4s]"></div>
                            <div class="w-1.5 h-14 bg-indigo-400/90 rounded-full animate-[wave-bounce_2.2s_ease-in-out_infinite_0.2s]"></div>
                            <div class="w-1.5 h-16 bg-indigo-300 rounded-full animate-[wave-bounce_2s_ease-in-out_infinite_0s] shadow-[0_0_12px_rgba(165,180,252,0.6)]"></div>
                            <div class="w-1.5 h-14 bg-indigo-400/90 rounded-full animate-[wave-bounce_1.8s_ease-in-out_infinite_0.5s]"></div>
                            <div class="w-1.5 h-10 bg-indigo-400/70 rounded-full animate-[wave-bounce_2s_ease-in-out_infinite_0.3s]"></div>
                            <div class="w-1.5 h-6 bg-indigo-400/60 rounded-full animate-[wave-bounce_2.3s_ease-in-out_infinite_0.6s]"></div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex items-center justify-center gap-8 mb-10 w-full">
                    <button class="w-12 h-12 rounded-full flex items-center justify-center text-stone-400 hover:text-white hover:bg-white/5 transition-colors">
                        <iconify-icon icon="lucide:rotate-ccw" width="22"></iconify-icon>
                    </button>
                    <button class="w-20 h-20 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 transition-transform shadow-[0_0_40px_rgba(255,255,255,0.15)]">
                        <iconify-icon icon="lucide:pause" width="32" class="ml-0.5"></iconify-icon>
                    </button>
                    <button class="w-12 h-12 rounded-full flex items-center justify-center text-stone-400 hover:text-white hover:bg-white/5 transition-colors">
                        <iconify-icon icon="lucide:volume-2" width="22"></iconify-icon>
                    </button>
                </div>

                <!-- Progress -->
                <div class="w-full flex flex-col gap-3">
                    <div class="h-1.5 w-full bg-stone-800/80 rounded-full overflow-hidden cursor-pointer group/progress">
                        <div class="h-full bg-indigo-500 w-1/3 rounded-full relative group-hover/progress:bg-indigo-400 transition-colors">
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-white rounded-full shadow-[0_0_10px_rgba(255,255,255,0.8)] opacity-0 group-hover/progress:opacity-100 transition-opacity"></div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-mono text-stone-400">15:00</span>
                        <span class="text-[10px] text-stone-500 font-medium">Ends with: Fade out</span>
                        <span class="text-xs font-mono text-stone-400">45:00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Controls Drawer -->
    <div class="fixed bottom-0 left-0 w-full z-50 flex justify-center pb-6 pointer-events-none">
        <div class="pointer-events-auto glass-panel border border-white/10 rounded-2xl w-[calc(100%-3rem)] max-w-3xl overflow-hidden bg-stone-950/90 backdrop-blur-2xl shadow-2xl transition-all duration-500 group hover:border-white/20 hover:bg-stone-950/95">
            
            <!-- Collapsed View -->
            <div class="px-6 py-4 flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-4 text-sm font-medium text-stone-300">
                    <iconify-icon icon="lucide:sliders-horizontal" width="18" class="text-stone-400"></iconify-icon>
                    <span class="flex items-center gap-2">Intensity <span class="text-white">3</span></span>
                    <span class="w-1 h-1 rounded-full bg-stone-600"></span>
                    <span class="text-white">45 min</span>
                    <span class="w-1 h-1 rounded-full bg-stone-600"></span>
                    <span class="text-white">Rain</span>
                </div>
                <iconify-icon icon="lucide:chevron-up" width="18" class="text-stone-500 group-hover:text-white transition-colors group-hover:rotate-180 duration-500"></iconify-icon>
            </div>
            
            <!-- Expanded View (Revealed on hover for MVP) -->
            <div class="max-h-0 group-hover:max-h-64 opacity-0 group-hover:opacity-100 transition-all duration-500 ease-in-out">
                <div class="px-6 pb-6 pt-2 border-t border-white/5 flex flex-col md:flex-row gap-8 mt-2">
                    
                    <!-- Intensity -->
                    <div class="flex-1">
                        <div class="text-[10px] text-stone-500 uppercase tracking-widest font-semibold mb-4">Intensity</div>
                        <div class="flex justify-between items-center gap-2">
                            <button class="w-9 h-9 rounded-full border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">1</button>
                            <div class="h-px flex-1 bg-white/10"></div>
                            <button class="w-9 h-9 rounded-full border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">2</button>
                            <div class="h-px flex-1 bg-white/10"></div>
                            <button class="w-9 h-9 rounded-full border border-indigo-500 bg-indigo-500/20 text-white text-sm shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-colors">3</button>
                            <div class="h-px flex-1 bg-white/10"></div>
                            <button class="w-9 h-9 rounded-full border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">4</button>
                            <div class="h-px flex-1 bg-white/10"></div>
                            <button class="w-9 h-9 rounded-full border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">5</button>
                        </div>
                    </div>
                    
                    <!-- Duration -->
                    <div class="flex-1">
                        <div class="text-[10px] text-stone-500 uppercase tracking-widest font-semibold mb-4">Duration</div>
                        <div class="flex gap-2">
                            <button class="flex-1 py-2 rounded-xl border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">15m</button>
                            <button class="flex-1 py-2 rounded-xl border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">30m</button>
                            <button class="flex-1 py-2 rounded-xl border border-indigo-500 bg-indigo-500/20 text-white text-sm shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-colors">45m</button>
                            <button class="flex-1 py-2 rounded-xl border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">60m</button>
                        </div>
                    </div>

                    <!-- Background -->
                    <div class="flex-1">
                        <div class="text-[10px] text-stone-500 uppercase tracking-widest font-semibold mb-4">Background</div>
                        <div class="flex gap-2">
                            <button class="flex-1 py-2 rounded-xl border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">None</button>
                            <button class="flex-1 py-2 rounded-xl border border-indigo-500 bg-indigo-500/20 text-white text-sm shadow-[0_0_15px_rgba(99,102,241,0.3)] transition-colors">Rain</button>
                            <button class="flex-1 py-2 rounded-xl border border-white/10 bg-white/5 text-stone-400 text-sm hover:bg-white/10 hover:text-white transition-colors">Noise</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
