<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTune - Ethereal Therapy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 15, 18, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow-accent: rgba(180, 198, 218, 0.4);
        }
        
        body {
            background-color: #030305;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .font-display {
            font-family: 'Cormorant Garamond', serif;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .glass-nav {
            background: linear-gradient(to bottom, rgba(3, 3, 5, 0.8) 0%, rgba(3, 3, 5, 0) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        /* Organic Animations */
        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        @keyframes stagger-up {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .animate-stagger-1 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both; }
        .animate-stagger-2 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both; }
        .animate-stagger-3 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; }
        .animate-stagger-4 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both; }

        @keyframes wave-bounce {
            0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Ethereal Orb Visualizer */
        .orb-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb-core {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle at 30% 30%, rgba(220, 230, 245, 0.8), rgba(120, 140, 170, 0.3) 60%, transparent 80%);
            box-shadow: 
                inset 0 0 20px rgba(255,255,255,0.6),
                0 0 40px rgba(160, 180, 210, 0.3),
                0 0 80px rgba(120, 140, 170, 0.15);
            animation: morph 8s ease-in-out infinite, float 6s ease-in-out infinite;
            z-index: 10;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .orb-core::after {
            content: '';
            position: absolute;
            inset: -20px;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: spin 12s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .orb-ring-1, .orb-ring-2 {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
            animation: pulse-glow 5s ease-in-out infinite;
        }

        .orb-ring-1 {
            width: 200px;
            height: 200px;
            animation-delay: 0s;
        }

        .orb-ring-2 {
            width: 260px;
            height: 260px;
            border: 1px dashed rgba(255,255,255,0.04);
            animation-delay: -2.5s;
        }

        /* Custom Input Styling */
        .ethereal-input {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.2);
        }
        .ethereal-input:focus-within {
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.15), 0 0 25px rgba(180, 198, 218, 0.1);
            border-color: rgba(255,255,255,0.2);
        }

        /* Active Chip */
        .chip-active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
            color: #fff;
        }
    </style>
</head>
<body class="antialiased selection:bg-white/20 selection:text-white overflow-hidden flex flex-col h-screen">

    <!-- Background (component) added by Aura -->
    <div class="aura-background-component fixed top-0 w-full h-screen -z-10" data-alpha-mask="80" style="mask-image: linear-gradient(to bottom, black 0%, black 70%, transparent); -webkit-mask-image: linear-gradient(to bottom, black 0%, black 70%, transparent)">
        <div class="w-full h-full relative">
            <div class="aura-background-component top-0 w-full absolute h-full opacity-80">
                <div data-us-project="bKN5upvoulAmWvInmHza" class="absolute w-full h-full left-0 top-0"></div>
                <script type="text/javascript">!function(){if(!window.UnicornStudio){window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v1.4.29/dist/unicornStudio.umd.js",i.onload=function(){window.UnicornStudio.isInitialized||(UnicornStudio.init(),window.UnicornStudio.isInitialized=!0)},(document.head || document.body).appendChild(i)}}();</script>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="w-full z-50 glass-nav transition-all duration-300 flex-shrink-0 absolute top-0">
        <div class="max-w-6xl mx-auto px-8 h-20 flex items-center justify-between">
            <a href="#" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center bg-white/5 backdrop-blur-md group-hover:bg-white/10 transition-all duration-500">
                    <iconify-icon icon="lucide:waves" class="text-white/80 group-hover:text-white" width="16"></iconify-icon>
                </div>
                <span class="text-xl font-medium tracking-wide text-white/90 font-display italic">MoodTune</span>
            </a>
            <button class="text-xs font-light px-5 py-2.5 rounded-full border transition-all duration-300 bg-transparent border-white/10 text-white/50 hover:border-white/30 hover:text-white flex items-center gap-2">
                <iconify-icon icon="lucide:rotate-ccw" width="12"></iconify-icon>
                Reset Aura
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto w-full relative z-10 flex flex-col items-center pt-32 pb-48 px-6">
        
        <!-- Intent Input Area -->
        <div class="w-full max-w-2xl mb-16 flex flex-col gap-6">
            <h1 class="font-display text-4xl md:text-5xl text-center mb-4 font-medium text-white/90 tracking-wide animate-stagger-1">
                How are you feeling <i class="text-white/50">today?</i>
            </h1>
            
            <div class="relative flex items-center group w-full ethereal-input rounded-full border border-white/10 transition-all duration-500 animate-stagger-2">
                <input type="text" placeholder="e.g., anxious, need focus, can't sleep..." 
                       class="w-full bg-transparent py-5 pl-8 pr-32 text-white/90 placeholder:text-white/30 focus:outline-none text-lg font-light tracking-wide">
                <button class="absolute right-3 h-10 px-6 rounded-full bg-white/10 text-white text-sm font-medium hover:bg-white/20 transition-all flex items-center gap-2 backdrop-blur-md border border-white/5 hover:scale-105">
                    <iconify-icon icon="lucide:sparkles" width="16"></iconify-icon>
                    Tune
                </button>
            </div>

            <!-- Chips -->
            <div class="flex flex-col gap-5 mt-4 animate-stagger-3 w-full">
                <!-- Row 1 -->
                <div class="flex items-center justify-center gap-3 flex-wrap">
                    <span class="text-[10px] text-white/30 uppercase tracking-[0.3em] font-medium mr-2">Mode</span>
                    <button class="px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/20 bg-white/10 text-white shadow-[0_0_15px_rgba(255,255,255,0.05)] transition-all">Deep Focus</button>
                    <button class="px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all">Calm Down</button>
                    <button class="px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all">Drift to Sleep</button>
                </div>
                <!-- Row 2 -->
                <div class="flex items-center justify-center gap-3 flex-wrap">
                    <span class="text-[10px] text-white/30 uppercase tracking-[0.3em] font-medium mr-2">Vibe</span>
                    <button class="px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all">Anxious</button>
                    <button class="px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all">Overwhelmed</button>
                    <button class="px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/20 bg-white/10 text-white shadow-[0_0_15px_rgba(255,255,255,0.05)] transition-all">Creative Flow</button>
                </div>
            </div>
        </div>

        <!-- Player Card -->
        <div class="w-full max-w-lg relative group animate-stagger-4">
            <div class="relative glass-panel rounded-[2.5rem] p-10 flex flex-col items-center">
                <!-- Top Bar -->
                <div class="w-full flex justify-between items-start mb-8">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-white/40 uppercase tracking-[0.3em] font-medium mb-2">Now Resonating</span>
                        <h2 class="text-3xl text-white flex items-center gap-3 font-display italic tracking-wide">
                            Ethereal Focus
                        </h2>
                    </div>
                    <button class="w-10 h-10 rounded-full border border-white/10 bg-white/5 flex items-center justify-center text-white/50 hover:text-white hover:bg-white/10 transition-all hover:rotate-180 duration-500">
                        <iconify-icon icon="lucide:refresh-cw" width="16"></iconify-icon>
                    </button>
                </div>

                <!-- The Orb Visualizer -->
                <div class="orb-container my-8">
                    <div class="orb-ring-2"></div>
                    <div class="orb-ring-1"></div>
                    <div class="orb-core flex items-center justify-center">
                        <!-- Inner subtle waves -->
                        <div class="flex items-center gap-1.5 z-20 opacity-70 mix-blend-overlay">
                            <div class="w-1 h-4 bg-white rounded-full animate-[wave-bounce_2.1s_ease-in-out_infinite_0.1s]"></div>
                            <div class="w-1 h-8 bg-white rounded-full animate-[wave-bounce_1.9s_ease-in-out_infinite_0.4s]"></div>
                            <div class="w-1 h-12 bg-white rounded-full animate-[wave-bounce_2.2s_ease-in-out_infinite_0.2s]"></div>
                            <div class="w-1 h-8 bg-white rounded-full animate-[wave-bounce_1.8s_ease-in-out_infinite_0.5s]"></div>
                            <div class="w-1 h-4 bg-white rounded-full animate-[wave-bounce_2.3s_ease-in-out_infinite_0.6s]"></div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex items-center justify-center gap-10 mb-10 w-full">
                    <button class="text-white/40 hover:text-white transition-colors hover:scale-110 duration-300">
                        <iconify-icon icon="lucide:skip-back" width="24"></iconify-icon>
                    </button>
                    <button class="w-20 h-20 rounded-full bg-white/10 border border-white/20 text-white flex items-center justify-center hover:bg-white/20 transition-all duration-300 shadow-[0_0_30px_rgba(255,255,255,0.05)] hover:shadow-[0_0_40px_rgba(255,255,255,0.15)] backdrop-blur-md group">
                        <iconify-icon icon="lucide:pause" width="28" class="group-hover:scale-95 transition-transform"></iconify-icon>
                    </button>
                    <button class="text-white/40 hover:text-white transition-colors hover:scale-110 duration-300">
                        <iconify-icon icon="lucide:skip-forward" width="24"></iconify-icon>
                    </button>
                </div>

                <!-- Progress -->
                <div class="w-full flex flex-col gap-4">
                    <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden cursor-pointer relative group/progress">
                        <div class="h-full bg-gradient-to-r from-white/30 to-white/80 w-1/3 rounded-full relative transition-all">
                            <div class="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 bg-white rounded-full shadow-[0_0_10px_rgba(255,255,255,0.8)] opacity-0 group-hover/progress:opacity-100 transition-opacity"></div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-mono text-white/30">15:00</span>
                        <span class="text-[10px] text-white/40 font-light tracking-widest uppercase">Binaural · 40Hz</span>
                        <span class="text-xs font-mono text-white/30">45:00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Controls Drawer (Floating Island) -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex justify-center pointer-events-none w-full max-w-2xl px-6">
        <div class="pointer-events-auto glass-panel rounded-3xl w-full overflow-hidden transition-all duration-500 group hover:bg-white/[0.05] border border-white/10 hover:border-white/20 shadow-2xl">
            
            <!-- Collapsed View -->
            <div class="px-8 py-5 flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-6 text-sm font-light text-white/60">
                    <iconify-icon icon="lucide:sliders-horizontal" width="18" class="text-white/40"></iconify-icon>
                    <span class="flex items-center gap-2">Intensity <span class="text-white font-medium">Medium</span></span>
                    <span class="w-1 h-1 rounded-full bg-white/20"></span>
                    <span class="text-white font-medium">45 min</span>
                    <span class="w-1 h-1 rounded-full bg-white/20"></span>
                    <span class="text-white font-medium">Rain</span>
                </div>
                <iconify-icon icon="lucide:chevron-up" width="20" class="text-white/40 group-hover:text-white transition-all group-hover:rotate-180 duration-500"></iconify-icon>
            </div>
            
            <!-- Expanded View -->
            <div class="max-h-0 group-hover:max-h-64 opacity-0 group-hover:opacity-100 transition-all duration-700 ease-in-out">
                <div class="px-8 pb-8 pt-2 border-t border-white/5 flex flex-col md:flex-row gap-10 mt-2">
                    
                    <!-- Intensity -->
                    <div class="flex-1">
                        <div class="text-[10px] text-white/30 uppercase tracking-[0.2em] font-medium mb-5">Intensity</div>
                        <div class="flex justify-between items-center gap-2">
                            <button class="w-8 h-8 rounded-full border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all">1</button>
                            <div class="h-px flex-1 bg-white/5"></div>
                            <button class="w-8 h-8 rounded-full border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all">2</button>
                            <div class="h-px flex-1 bg-white/5"></div>
                            <button class="w-8 h-8 rounded-full border border-white/20 bg-white/10 text-white text-xs shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-all">3</button>
                            <div class="h-px flex-1 bg-white/5"></div>
                            <button class="w-8 h-8 rounded-full border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all">4</button>
                        </div>
                    </div>
                    
                    <!-- Duration -->
                    <div class="flex-1">
                        <div class="text-[10px] text-white/30 uppercase tracking-[0.2em] font-medium mb-5">Duration</div>
                        <div class="flex gap-2">
                            <button class="flex-1 py-2 rounded-xl border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all">15m</button>
                            <button class="flex-1 py-2 rounded-xl border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all">30m</button>
                            <button class="flex-1 py-2 rounded-xl border border-white/20 bg-white/10 text-white text-xs shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-all">45m</button>
                        </div>
                    </div>

                    <!-- Environment -->
                    <div class="flex-1">
                        <div class="text-[10px] text-white/30 uppercase tracking-[0.2em] font-medium mb-5">Environment</div>
                        <div class="flex gap-2">
                            <button class="flex-1 py-2 rounded-xl border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all">None</button>
                            <button class="flex-1 py-2 rounded-xl border border-white/20 bg-white/10 text-white text-xs shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-all">Rain</button>
                            <button class="flex-1 py-2 rounded-xl border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all">Noise</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
