<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTune - Ethereal Therapy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 15, 18, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow-accent: rgba(180, 198, 218, 0.4);
        }
        
        body {
            background-color: #030305;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .font-display {
            font-family: 'Cormorant Garamond', serif;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .glass-nav {
            background: linear-gradient(to bottom, rgba(3, 3, 5, 0.8) 0%, rgba(3, 3, 5, 0) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        /* Organic Animations */
        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        @keyframes stagger-up {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .animate-stagger-1 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both; }
        .animate-stagger-2 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both; }
        .animate-stagger-3 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; }
        .animate-stagger-4 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both; }

        @keyframes wave-bounce {
            0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Gramophone Visualizer */
        .gramophone-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));
        }

        /* Glow effects */
        .gramophone-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 198, 218, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        .gramophone-aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            animation: record-spin 20s linear infinite reverse;
            pointer-events: none;
        }

        /* Vinyl Record */
        .gramophone-record {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(
                    circle,
                    #14151a 0,
                    #14151a 2px,
                    #1f2129 3px,
                    #1f2129 4px
                );
            box-shadow: 
                inset 0 0 20px rgba(0, 0, 0, 0.8),
                0 10px 30px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(255, 255, 255, 0.05);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: record-spin 4s linear infinite;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 5;
        }

        /* Vinyl Light Reflection */
        .gramophone-record::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 255, 255, 0.05) 45deg,
                transparent 90deg,
                transparent 180deg,
                rgba(255, 255, 255, 0.05) 225deg,
                transparent 270deg,
                transparent 360deg
            );
            pointer-events: none;
        }

        /* Record Label / Center */
        .record-label {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4b5263, #2a2e38);
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .record-hole {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #030305;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Floating Notes */
        .music-note {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            z-index: 15;
            animation: float-note 4s ease-out infinite;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        .note-1 { top: 40%; left: 20%; animation-delay: 0s; font-size: 1.1rem; }
        .note-2 { top: 60%; left: 30%; animation-delay: 1.5s; font-size: 1.4rem; }
        .note-3 { top: 25%; left: 60%; animation-delay: 2.5s; font-size: 0.9rem; }

        /* Tonearm Container */
        .tonearm-container {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 40px;
            height: 140px;
            z-index: 10;
            transform-origin: 20px 20px;
            animation: arm-bob 6s ease-in-out infinite alternate;
            transform: rotate(12deg);
        }

        .tonearm-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f8fafc, #94a3b8);
            box-shadow: 
                0 4px 10px rgba(0,0,0,0.5),
                inset 0 0 0 2px rgba(255,255,255,0.2);
            z-index: 2;
        }

        .tonearm-base::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #1e293b;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }

        /* The Stick */
        .tonearm-arm {
            position: absolute;
            top: 20px;
            left: 17px;
            width: 6px;
            height: 110px;
            background: linear-gradient(to right, #cbd5e1, #64748b);
            border-radius: 3px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4);
            transform-origin: top center;
            transform: rotate(25deg);
        }

        /* Stylus Head */
        .stylus-head {
            position: absolute;
            bottom: -8px;
            left: -6px;
            width: 18px;
            height: 28px;
            background: linear-gradient(135deg, #e2e8f0, #475569);
            border-radius: 3px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.5);
            transform: rotate(-15deg);
        }

        .stylus-head::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 4px;
            background: #94a3b8;
            border-radius: 1px;
        }

        @keyframes record-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes arm-bob {
            0% { transform: rotate(12deg); }
            50% { transform: rotate(14deg); }
            100% { transform: rotate(10deg); }
        }

        @keyframes float-note {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-40px) scale(1.1) rotate(15deg); opacity: 0; }
        }

        /* Custom Input Styling */
        .ethereal-input {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.2);
        }
        .ethereal-input:focus-within {
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.15), 0 0 25px rgba(180, 198, 218, 0.1);
            border-color: rgba(255,255,255,0.2);
        }
        
        .ethereal-input input {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        
        .ethereal-input input::placeholder {
            text-shadow: none;
        }

        /* Active Chip */
        .chip-active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
            color: #fff;
        }

        /* Interpreting label */
        @keyframes interp-flash {
            from { opacity: 0; transform: translateX(-8px); filter: blur(4px); }
            to   { opacity: 1; transform: translateX(0);    filter: blur(0);   }
        }
        .interp-flash {
            animation: interp-flash 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        #interpreting-label {
            transition: opacity 0.4s ease;
        }

        /* Player card cross-fade */
        #player-title {
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        #player-subtext {
            transition: opacity 0.22s ease;
        }

        /* Glow tint morph */
        #gramophone-glow {
            transition: background 1.4s ease;
        }

        /* Record pause — !important ensures it beats the animation shorthand in the class rule */
        .record-paused {
            animation-play-state: paused !important;
        }

        /* Regenerate button spin */
        @keyframes regen-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .regen-spinning {
            animation: regen-spin 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        /* Progress bar thumb — always visible while dragging */
        #progress-track.dragging #progress-thumb {
            opacity: 1 !important;
        }
        #progress-thumb {
            transition: opacity 0.2s ease, left 0.9s linear;
        }

        /* Pause tonearm and aura ring only — floating notes keep playing */
        .gramophone-paused .tonearm-container,
        .gramophone-paused .gramophone-aura {
            animation-play-state: paused !important;
        }

        /* ── Equalizer Bars ──────────────────────────────────────────────── */
        @keyframes eq-wave {
            0%   { transform: scaleY(var(--eq-min, 0.12)); }
            100% { transform: scaleY(var(--eq-max, 1)); }
        }

        .eq-bar {
            flex: 1;
            min-width: 0;
            border-radius: 2px 2px 1px 1px;
            background: linear-gradient(to top, rgba(255,255,255,0.18), rgba(255,255,255,0.04));
            transform-origin: bottom center;
            animation: eq-wave var(--eq-dur, 1s) var(--eq-delay, 0s) ease-in-out infinite alternate;
            /* only transform/opacity transition — background updates are intentionally instant */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.15, 1),
                        opacity  0.6s ease;
        }

        /* Paused: strip animation so transition takes over → bars melt to near-flat */
        .eq-paused .eq-bar {
            animation: none;
            transform: scaleY(0.07);
            opacity: 0.22;
        }

        /* ── Profile Modal ────────────────────────────────────────────────── */
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.96) translateY(18px); filter: blur(8px); }
            to   { opacity: 1; transform: scale(1)    translateY(0);    filter: blur(0);   }
        }
        @keyframes step-slide-in {
            from { opacity: 0; transform: translateX(14px); }
            to   { opacity: 1; transform: translateX(0);    }
        }
        @keyframes step-slide-back {
            from { opacity: 0; transform: translateX(-14px); }
            to   { opacity: 1; transform: translateX(0);     }
        }

        #profile-modal { transition: opacity 0.4s ease; }

        #profile-card {
            animation: modal-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .step-panel { display: none; }
        .step-panel.active {
            display: block;
            animation: step-slide-in 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .step-panel.active.going-back {
            animation: step-slide-back 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Profile chip */
        .p-chip {
            padding: 0.5rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.76rem;
            font-weight: 300;
            letter-spacing: 0.06em;
            border: 1px solid rgba(255,255,255,0.07);
            background: transparent;
            color: rgba(255,255,255,0.38);
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
            white-space: nowrap;
            line-height: 1;
            font-family: 'Outfit', sans-serif;
        }
        .p-chip:hover {
            border-color: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.75);
        }
        .p-chip.p-active {
            background: rgba(255,255,255,0.10);
            border-color: rgba(255,255,255,0.28);
            color: #fff;
            box-shadow: 0 0 14px rgba(255,255,255,0.05);
        }

        /* Profile text field */
        .p-field {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 1rem;
            padding: 0.85rem 1.2rem;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.07);
            transition: all 0.3s ease;
        }
        .p-field:focus-within {
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            border-color: rgba(255,255,255,0.18);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.12), 0 0 20px rgba(180,198,218,0.08);
        }
        .p-field input,
        .p-field textarea {
            width: 100%;
            background: transparent;
            color: rgba(255,255,255,0.88);
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            outline: none;
            caret-color: white;
            font-family: 'Outfit', sans-serif;
        }
        .p-field input::placeholder,
        .p-field textarea::placeholder { color: rgba(255,255,255,0.22); }
        .p-field textarea { resize: none; line-height: 1.65; }

        /* Profile label */
        .p-label {
            display: block;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-weight: 500;
            color: rgba(255,255,255,0.28);
            margin-bottom: 0.75rem;
        }
        .p-label-note {
            text-transform: none;
            letter-spacing: normal;
            font-weight: 300;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.18);
        }

        /* Slider */
        .p-slider {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
            height: 22px;
        }
        .p-slider::-webkit-slider-runnable-track {
            background: rgba(255,255,255,0.08);
            height: 2px;
            border-radius: 1px;
        }
        .p-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: rgba(255,255,255,0.85);
            margin-top: -7px;
            box-shadow: 0 0 10px rgba(255,255,255,0.22), 0 2px 6px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }
        .p-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 18px rgba(255,255,255,0.38), 0 2px 8px rgba(0,0,0,0.4);
            transform: scale(1.12);
        }
        .p-slider::-moz-range-track {
            background: rgba(255,255,255,0.08);
            height: 2px; border-radius: 1px; border: none;
        }
        .p-slider::-moz-range-thumb {
            width: 16px; height: 16px; border-radius: 50%;
            background: rgba(255,255,255,0.85);
            border: none; box-shadow: 0 0 10px rgba(255,255,255,0.22);
            cursor: pointer;
        }

        /* Profile modal scrollbar */
        #profile-scroll::-webkit-scrollbar { width: 0; }

        /* Step dot transition */
        .sdot { transition: width 0.4s ease, background 0.4s ease; }

        /* Toast */
        @keyframes toast-in {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0);   }
        }
        @keyframes toast-out {
            from { opacity: 1; }
            to   { opacity: 0; }
        }
    </style>
</head>

                        <button class="p-chip" data-group="therapyTypes" data-multi="1" data-val="meditation">Meditation</button>
                        <button class="p-chip" data-group="therapyTypes" data-multi="1" data-val="cbt">CBT</button>
                        <button class="p-chip" data-group="therapyTypes" data-multi="1" data-val="somatic">Somatic Therapy</button>

                <div class="mb-7">

                    <div class="flex gap-2 flex-wrap">
                        <button class="p-chip" data-group="sessions" data-val="0">None yet</button>
                        <button class="p-chip" data-group="sessions" data-val="1-5">1 – 5</button>
                        <button class="p-chip" data-group="sessions" data-val="6-20">6 – 20</button>
                        <button class="p-chip" data-group="sessions" data-val="21+">21 +</button>

                <div class="mb-7">
                    <label class="p-label">Overall Effectiveness of Past Therapy</label>
                    <div class="flex gap-2 flex-wrap">
                        <button class="p-chip" data-group="effectiveness" data-val="excellent">Excellent</button>
                        <button class="p-chip" data-group="effectiveness" data-val="good">Good</button>
                        <button class="p-chip" data-group="effectiveness" data-val="fair">Fair</button>
                        <button class="p-chip" data-group="effectiveness" data-val="poor">Poor</button>
                        <button class="p-chip" data-group="effectiveness" data-val="na">N / A</button>
                    </div>
                </div>

                <div class="mb-7">
                    <label class="p-label" for="p-notes">Feedback & Additional Notes <span class="p-label-note">(for your therapist)</span></label>
                    <div class="p-field">
                        <textarea id="p-notes" rows="4" placeholder="Describe past experiences, what worked, what didn't, or anything your therapist should know…"></textarea>
                    </div>
                </div>

            </div><!-- /step 5 -->

        </div><!-- /scroll -->

        <!-- ── Footer Navigation ──────────────────────────────────── -->
        <div class="px-9 py-7 flex-shrink-0 border-t border-white/5 flex items-center justify-between">

            <button id="p-prev" class="text-xs font-light px-6 py-3 rounded-full border border-white/10 text-white/38 hover:text-white hover:border-white/28 transition-all duration-300 flex items-center gap-2" style="opacity:0;pointer-events:none;">
                <iconify-icon icon="lucide:arrow-left" width="13"></iconify-icon>
                Back
            </button>

            <!-- Completion dots (right side) -->
            <div class="flex items-center gap-5">
                <button id="p-next" class="text-xs font-light px-8 py-3 rounded-full bg-white/10 border border-white/20 text-white hover:bg-white/18 transition-all duration-300 flex items-center gap-2">
                    Continue
                    <iconify-icon icon="lucide:arrow-right" width="13"></iconify-icon>
                </button>
            </div>

        </div>

    </div><!-- /card -->
</div><!-- /modal -->


<script>
(function () {
    'use strict';

    // ── Mode configuration ────────────────────────────────────────────────
    const MODES = {
        focus: {
            title:          'Deep Focus',
            subtext:        'Binaural · 40Hz',
            interpretation: 'Focus · Structured · High density · 40Hz',
            recordSpeed:    '3.5s',
            glowColor:      'rgba(180, 198, 218, 0.22)',
        },
        calm: {
            title:          'Soft Calm',
            subtext:        'Theta · 6Hz',
            interpretation: 'Calm · Warm · Slow · Low density',
            recordSpeed:    '9s',
            glowColor:      'rgba(251, 191, 36, 0.16)',
        },
        sleep: {
            title:          'Sleep Drift',
            subtext:        'Delta · 2Hz',
            interpretation: 'Sleep · Soft · Delta wave · Fade-out',
            recordSpeed:    '18s',
            glowColor:      'rgba(139, 92, 246, 0.2)',
        },
    };

    const VIBE_LABELS = {
        anxious:    'Grounding',
        overwhelmed:'Decompression',
        creative:   'Generative flow',
    };

    // Speed multiplier per mode — higher = slower / more hypnotic
    const EQ_SPEED_FACTOR = { focus: 0.62, calm: 1.45, sleep: 3.20 };

    // Tailwind class sets for chips (all classes must already exist in DOM so CDN generates them)
    const ON  = ['border-white/20', 'bg-white/10', 'text-white', 'shadow-[0_0_15px_rgba(255,255,255,0.05)]'];
    const OFF = ['border-white/5',  'bg-transparent', 'text-white/50', 'hover:border-white/20', 'hover:text-white'];

    // Drawer button active/inactive (same visual logic, slightly different shadow value)
    const D_ON  = ['border-white/20', 'bg-white/10', 'text-white', 'shadow-[0_0_10px_rgba(255,255,255,0.1)]'];
    const D_OFF = ['border-white/5',  'bg-transparent', 'text-white/40', 'hover:border-white/20', 'hover:text-white'];

    // ── State ─────────────────────────────────────────────────────────────
    let currentMode      = 'focus';
    let selectedVibes    = new Set(['creative']);
    let isPlaying        = true;
    let elapsedSec       = 15 * 60;   // start at 15 min
    let totalSec         = 45 * 60;   // mutable — updated by Duration picker
    let currentIntensity = 3;
    let currentDuration  = 45;        // minutes
    let currentEnv       = 'Rain';
    let ticker           = null;

    const INTENSITY_LABELS = { 1: 'Light', 2: 'Gentle', 3: 'Medium', 4: 'Strong' };

    // ── DOM refs ──────────────────────────────────────────────────────────
    const gramophoneContainer = document.getElementById('gramophone-container');
    const record        = document.getElementById('gramophone-record');
    const glow          = document.getElementById('gramophone-glow');
    const playerTitle   = document.getElementById('player-title');
    const playerSubtext = document.getElementById('player-subtext');
    const progressTrack = document.getElementById('progress-track');
    const progressThumb = document.getElementById('progress-thumb');
    const timeElapsed   = document.getElementById('time-elapsed');
    const restartBtn       = document.getElementById('restart-btn');
    const regenBtn         = document.getElementById('regen-btn');
    const regenIcon        = document.getElementById('regen-icon');
    const timeTotal        = document.getElementById('time-total');
    const summaryIntensity = document.getElementById('summary-intensity');
    const summaryDuration  = document.getElementById('summary-duration');
    const summaryEnv       = document.getElementById('summary-env');
    const playBtn       = document.getElementById('play-btn');
    const playIcon      = document.getElementById('play-icon');
    const interpLabel   = document.getElementById('interpreting-label');
    const interpText    = document.getElementById('interpreting-text');
    const eqBars        = document.getElementById('eq-bars');
    let   eqBarEls      = [];   // populated by waveform generation below
    const skipForwardBtn = document.getElementById('skip-forward-btn');
    const resetAuraBtn   = document.getElementById('reset-aura-btn');

    // ── EQ speed update ───────────────────────────────────────────────────
    // Scales each bar's animation-duration by the mode-specific factor so
    // Focus feels quick/energetic, Calm gentle, Sleep barely breathing.
    function updateEqSpeed(mode) {
        const factor = EQ_SPEED_FACTOR[mode] ?? 1;
        eqBarEls.forEach(bar => {
            bar.style.animationDuration = (parseFloat(bar.dataset.baseDur) * factor).toFixed(3) + 's';
        });
    }

    // ── Helpers ───────────────────────────────────────────────────────────
    function fmt(sec) {
        return String(Math.floor(sec / 60)).padStart(2, '0') + ':' +
               String(sec % 60).padStart(2, '0');
    }

    // Colour waveform bars (played = bright, unplayed = dim) and move playhead cursor
    function updateProgressVisuals(sec) {
        const pct         = (sec / totalSec) * 100;
        const playedCount = Math.round((sec / totalSec) * eqBarEls.length);
        eqBarEls.forEach((bar, i) => {
            bar.style.background = i < playedCount
                ? 'linear-gradient(to top, rgba(255,255,255,0.72), rgba(255,255,255,0.24))'
                : 'linear-gradient(to top, rgba(255,255,255,0.18), rgba(255,255,255,0.04))';
        });
        progressThumb.style.left = pct + '%';
        timeElapsed.textContent  = fmt(sec);
    }

    function setChipActive(btn, on) {
        if (on) {
            OFF.forEach(c => btn.classList.remove(c));
            ON.forEach(c  => btn.classList.add(c));
        } else {
            ON.forEach(c  => btn.classList.remove(c));
            OFF.forEach(c => btn.classList.add(c));
        }
    }

    function flashInterpText() {
        interpText.classList.remove('interp-flash');
        void interpText.offsetWidth;            // reflow to restart animation
        interpText.classList.add('interp-flash');
    }

    function refreshInterpretation() {
        const cfg = MODES[currentMode];
        const baseParts = cfg ? cfg.interpretation.split(' · ') : [];
        const vibeParts = [...selectedVibes].map(v => VIBE_LABELS[v]).filter(Boolean);
        const all = [...baseParts, ...vibeParts];

        if (all.length === 0) {
            interpLabel.style.opacity = '0';
            return;
        }
        interpText.textContent    = all.join(' · ');
        interpLabel.style.opacity = '1';
        flashInterpText();
    }

    // ── Player Card state ─────────────────────────────────────────────────
    function applyMode(mode) {
        const cfg = MODES[mode];
        if (!cfg) return;

        // Title cross-fade
        playerTitle.style.opacity   = '0';
        playerTitle.style.transform = 'translateY(5px)';
        setTimeout(() => {
            playerTitle.textContent     = cfg.title;
            playerTitle.style.opacity   = '1';
            playerTitle.style.transform = 'translateY(0)';
        }, 220);

        // Subtext cross-fade
        playerSubtext.style.opacity = '0';
        setTimeout(() => {
            playerSubtext.textContent   = cfg.subtext;
            playerSubtext.style.opacity = '1';
        }, 270);

        // Record rotation speed (only when playing)
        if (isPlaying) record.style.animationDuration = cfg.recordSpeed;

        // Glow color morph (CSS transition handles smoothness)
        glow.style.background = `radial-gradient(circle, ${cfg.glowColor} 0%, transparent 70%)`;

        // Adjust EQ bounce tempo to match the new mode's frequency feel
        updateEqSpeed(mode);
    }

    // ── Smooth progress reset ─────────────────────────────────────────────
    function resetProgressAnimated() {
        const EASE    = 'cubic-bezier(0.4, 0, 0.15, 1)';
        const DUR     = '0.45s';
        const RESTORE = 550;

        progressThumb.style.transition = `opacity 0.2s ease, left ${DUR} ${EASE}`;
        updateProgressVisuals(0);

        setTimeout(() => {
            progressThumb.style.transition = 'opacity 0.2s ease, left 0.9s linear';
        }, RESTORE);
    }

    // ── Playback ──────────────────────────────────────────────────────────
    function startTicker() {
        if (ticker) return;
        ticker = setInterval(() => {
            if (elapsedSec >= totalSec) { setPlaying(false); return; }
            elapsedSec++;
            updateProgressVisuals(elapsedSec);
        }, 1000);
    }

    function stopTicker() {
        clearInterval(ticker);
        ticker = null;
    }

    function setPlaying(on) {
        isPlaying = on;
        if (on) {
            playIcon.setAttribute('icon', 'lucide:pause');
            record.classList.remove('record-paused');
            gramophoneContainer.classList.remove('gramophone-paused');
            record.style.animationDuration = MODES[currentMode]?.recordSpeed ?? '4s';
            document.title = '▶ Playing… · MoodTune';
            // Resume EQ bars: remove paused class so CSS animation re-engages
            eqBars.classList.remove('eq-paused');
            startTicker();
        } else {
            playIcon.setAttribute('icon', 'lucide:play');
            record.classList.add('record-paused');
            gramophoneContainer.classList.add('gramophone-paused');
            document.title = 'MoodTune - Ethereal Therapy';
            // Dissipate EQ bars: strip animation, transition handles smooth melt-down
            eqBars.classList.add('eq-paused');
            stopTicker();
        }
    }

    // ── Mode chips ────────────────────────────────────────────────────────
    document.querySelectorAll('.mode-chip').forEach(btn => {
        btn.addEventListener('click', () => {
            const mode = btn.dataset.mode;
            if (currentMode === mode) return;
            document.querySelectorAll('.mode-chip').forEach(b => setChipActive(b, false));
            setChipActive(btn, true);
            currentMode = mode;
            applyMode(mode);
            refreshInterpretation();
        });
    });

    // ── Vibe chips ────────────────────────────────────────────────────────
    document.querySelectorAll('.vibe-chip').forEach(btn => {
        btn.addEventListener('click', () => {
            const vibe = btn.dataset.vibe;
            if (selectedVibes.has(vibe)) {
                selectedVibes.delete(vibe);
                setChipActive(btn, false);
            } else {
                if (selectedVibes.size >= 3) return;   // max 3 vibes
                selectedVibes.add(vibe);
                setChipActive(btn, true);
            }
            refreshInterpretation();
        });
    });

    // ── Progress bar drag ─────────────────────────────────────────────────
    let isDragging = false;

    function clientXFromEvent(e) {
        return e.touches ? e.touches[0].clientX : e.clientX;
    }

    function scrubTo(e) {
        const rect = progressTrack.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (clientXFromEvent(e) - rect.left) / rect.width));
        elapsedSec = Math.round(pct * totalSec);
        updateProgressVisuals(elapsedSec);
    }

    function onDragStart(e) {
        isDragging = true;
        progressThumb.style.transition = 'opacity 0.2s ease, left 0s';
        progressTrack.classList.add('dragging');
        scrubTo(e);
        e.preventDefault();
    }

    function onDragMove(e) {
        if (!isDragging) return;
        scrubTo(e);
    }

    function onDragEnd() {
        if (!isDragging) return;
        isDragging = false;
        progressThumb.style.transition = 'opacity 0.2s ease, left 0.9s linear';
        progressTrack.classList.remove('dragging');
    }

    progressTrack.addEventListener('mousedown',  onDragStart);
    progressTrack.addEventListener('touchstart', onDragStart, { passive: false });
    window.addEventListener('mousemove',  onDragMove);
    window.addEventListener('touchmove',  onDragMove, { passive: false });
    window.addEventListener('mouseup',    onDragEnd);
    window.addEventListener('touchend',   onDragEnd);

    // ── Drawer helpers ────────────────────────────────────────────────────
    function setDrawerActive(btn, on) {
        if (on) {
            D_OFF.forEach(c => btn.classList.remove(c));
            D_ON.forEach(c  => btn.classList.add(c));
        } else {
            D_ON.forEach(c  => btn.classList.remove(c));
            D_OFF.forEach(c => btn.classList.add(c));
        }
    }

    // ── Intensity ─────────────────────────────────────────────────────────
    document.querySelectorAll('.intensity-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const val = +btn.dataset.intensity;
            if (currentIntensity === val) return;
            document.querySelectorAll('.intensity-btn').forEach(b => setDrawerActive(b, false));
            setDrawerActive(btn, true);
            currentIntensity = val;
            summaryIntensity.textContent = INTENSITY_LABELS[val];
        });
    });

    // ── Duration ──────────────────────────────────────────────────────────
    document.querySelectorAll('.duration-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const mins = +btn.dataset.duration;
            if (currentDuration === mins) return;
            document.querySelectorAll('.duration-btn').forEach(b => setDrawerActive(b, false));
            setDrawerActive(btn, true);
            currentDuration = mins;
            totalSec = mins * 60;

            // Clamp elapsed if it now exceeds the new total
            if (elapsedSec > totalSec) {
                elapsedSec = totalSec;
                updateProgressVisuals(elapsedSec);
            } else {
                // Re-render fill/thumb ratio for new total
                updateProgressVisuals(elapsedSec);
            }

            timeTotal.textContent        = `${String(mins).padStart(2,'0')}:00`;
            summaryDuration.textContent  = `${mins} min`;
        });
    });

    // ── Environment ───────────────────────────────────────────────────────
    document.querySelectorAll('.env-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const env = btn.dataset.env;
            if (currentEnv === env) return;
            document.querySelectorAll('.env-btn').forEach(b => setDrawerActive(b, false));
            setDrawerActive(btn, true);
            currentEnv = env;
            summaryEnv.textContent = env;
        });
    });

    // ── Restart (skip-back) — reset to 00:00 and resume ──────────────────
    restartBtn.addEventListener('click', () => {
        elapsedSec = 0;
        resetProgressAnimated();
        if (!isPlaying) setPlaying(true);
    });

    // ── Regenerate — cycle to next mode preset with spin animation ────────
    const MODE_KEYS = Object.keys(MODES);   // ['focus', 'calm', 'sleep']

    regenBtn.addEventListener('click', () => {
        // Spin the icon
        regenIcon.classList.remove('regen-spinning');
        void regenIcon.offsetWidth;
        regenIcon.classList.add('regen-spinning');

        // Cycle to next mode
        const nextMode = MODE_KEYS[(MODE_KEYS.indexOf(currentMode) + 1) % MODE_KEYS.length];
        document.querySelectorAll('.mode-chip').forEach(b => setChipActive(b, b.dataset.mode === nextMode));
        currentMode = nextMode;
        applyMode(nextMode);
        refreshInterpretation();

        // Reset progress for new session
        elapsedSec = 0;
        resetProgressAnimated();
        if (!isPlaying) setPlaying(true);
    });

    // ── Toast (global so profile script can reuse it) ─────────────────────
    window.showToast = function (msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:9rem;left:50%;transform:translateX(-50%);z-index:200;' +
            'animation:toast-in 0.4s cubic-bezier(0.16,1,0.3,1) both;' +
            'background:rgba(15,15,18,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);' +
            'border:1px solid rgba(255,255,255,0.14);border-radius:9999px;' +
            'padding:0.6rem 1.4rem;display:flex;align-items:center;gap:0.5rem;' +
            'color:rgba(255,255,255,0.75);font-size:0.7rem;letter-spacing:0.1em;font-family:Outfit,sans-serif;';
        t.innerHTML = '<iconify-icon icon="lucide:check-circle-2" width="14" style="color:rgba(255,255,255,0.5)"></iconify-icon> ' + msg;
        document.body.appendChild(t);
        setTimeout(() => {
            t.style.animation = 'toast-out 0.35s ease forwards';
            setTimeout(() => t.remove(), 380);
        }, 2300);
    };

    // ── Skip Forward — advance 30 s ───────────────────────────────────────
    skipForwardBtn.addEventListener('click', () => {
        elapsedSec = Math.min(elapsedSec + 30, totalSec);
        updateProgressVisuals(elapsedSec);
        if (elapsedSec >= totalSec) { setPlaying(false); }
        else if (!isPlaying) { setPlaying(true); }
    });

    // ── Reset Aura — restore full initial state ───────────────────────────
    resetAuraBtn.addEventListener('click', () => {
        currentMode   = 'focus';
        selectedVibes = new Set();
        document.querySelectorAll('.mode-chip').forEach(b => setChipActive(b, b.dataset.mode === 'focus'));
        document.querySelectorAll('.vibe-chip').forEach(b => setChipActive(b, false));
        currentIntensity = 3;
        currentDuration  = 45;
        currentEnv       = 'Rain';
        totalSec         = 45 * 60;
        summaryIntensity.textContent = INTENSITY_LABELS[3];
        summaryDuration.textContent  = '45 min';
        summaryEnv.textContent       = 'Rain';
        timeTotal.textContent        = '45:00';
        document.querySelectorAll('.intensity-btn').forEach(b => setDrawerActive(b, +b.dataset.intensity === 3));
        document.querySelectorAll('.duration-btn').forEach(b  => setDrawerActive(b, +b.dataset.duration  === 45));
        document.querySelectorAll('.env-btn').forEach(b       => setDrawerActive(b, b.dataset.env === 'Rain'));
        document.querySelector('input[type="text"]').value = '';
        applyMode('focus');
        refreshInterpretation();
        elapsedSec = 0;
        resetProgressAnimated();
        if (!isPlaying) setPlaying(true);
        window.showToast('Aura reset');
    });

    // ── Play / Pause ──────────────────────────────────────────────────────
    playBtn.addEventListener('click', () => setPlaying(!isPlaying));

    // ── Generate waveform bars ────────────────────────────────────────────
    // 52 height values that form a realistic-looking audio waveform shape
    const WAVEFORM = [
        .30,.48,.75,.58,.85,.68,.40,.62,.80,.52,
        .70,.90,.62,.80,.48,.72,.98,.60,.35,.70,
        .46,.82,.56,.92,.74,.50,.38,.65,.83,.72,
        .90,.52,.75,.60,.84,.49,.67,.91,.58,.42,
        .69,.51,.79,.65,.93,.55,.38,.61,.76,.52,.36,.46
    ];
    WAVEFORM.forEach((h, i) => {
        const bar   = document.createElement('div');
        bar.className = 'eq-bar';
        const dur   = (0.55 + h * 0.75).toFixed(2);    // taller bars slightly slower
        const delay = ((i % 9) * 0.055).toFixed(3);     // staggered phase offset
        bar.dataset.baseDur = dur;                        // stored for updateEqSpeed
        bar.style.cssText   = `height:${(h * 100).toFixed(1)}%;` +
                              `--eq-min:${(h * 0.50).toFixed(2)};` +
                              `--eq-max:${Math.min(h * 1.12, 1).toFixed(2)};` +
                              `--eq-dur:${dur}s;--eq-delay:${delay}s;`;
        eqBars.appendChild(bar);
        eqBarEls.push(bar);
    });

    // ── Init ──────────────────────────────────────────────────────────────
    // Sync chip visuals with initial JS state
    document.querySelectorAll('.mode-chip').forEach(b =>
        setChipActive(b, b.dataset.mode === currentMode));
    document.querySelectorAll('.vibe-chip').forEach(b =>
        setChipActive(b, selectedVibes.has(b.dataset.vibe)));

    // Apply initial mode to card and interpretation label
    applyMode(currentMode);
    refreshInterpretation();

    // Sync initial progress visuals (fill + thumb + time label)
    updateProgressVisuals(elapsedSec);

    // Sync drawer initial state with JS state
    document.querySelectorAll('.intensity-btn').forEach(b =>
        setDrawerActive(b, +b.dataset.intensity === currentIntensity));
    document.querySelectorAll('.duration-btn').forEach(b =>
        setDrawerActive(b, +b.dataset.duration === currentDuration));
    document.querySelectorAll('.env-btn').forEach(b =>
        setDrawerActive(b, b.dataset.env === currentEnv));

    // Kick off auto-play
    record.style.animationDuration = MODES[currentMode].recordSpeed;
    updateEqSpeed(currentMode);   // sync EQ tempo with initial mode
    startTicker();
    document.title = '▶ Playing… · MoodTune';
})();
</script>

<!-- ── Profile Modal JS ──────────────────────────────────────────── -->
<script>
(function () {
    'use strict';

    // ── DOM ──────────────────────────────────────────────────────────
    const modal        = document.getElementById('profile-modal');
    const backdrop     = document.getElementById('profile-backdrop');
    const card         = document.getElementById('profile-card');
    const openBtn      = document.getElementById('profile-btn');
    const closeBtn     = document.getElementById('profile-close');
    const prevBtn      = document.getElementById('p-prev');
    const nextBtn      = document.getElementById('p-next');
    const stepTitle    = document.getElementById('p-step-title');
    const stepCounter  = document.getElementById('p-step-counter');
    const stepDots     = document.querySelectorAll('.sdot');
    const panels       = document.querySelectorAll('.step-panel');
    const savedDot     = document.getElementById('profile-saved-dot');
    const btnLabel     = document.getElementById('profile-btn-label');
    const scrollArea   = document.getElementById('profile-scroll');

    const STEP_TITLES = [
        'Basic Information',
        'Physical Health',
        'Emotional Landscape',
        'Music Preferences',
        'Treatment History',
    ];
    const TOTAL = 5;
    let step = 0;
    let goingBack = false;

    // per-group multi-select state  { groupName: Set<val> }
    const multiSets = {};

    // ── Open / Close ─────────────────────────────────────────────────
    function openModal() {
        modal.style.opacity = '1';
        modal.style.pointerEvents = 'auto';
        // Re-trigger card entrance
        card.style.animation = 'none';
        void card.offsetWidth;
        card.style.animation = 'modal-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both';
    }

    function closeModal() {
        modal.style.opacity = '0';
        modal.style.pointerEvents = 'none';
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    backdrop.addEventListener('click', closeModal);

    // Keyboard ESC
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && modal.style.pointerEvents !== 'none') closeModal();
    });

    // ── Step navigation ───────────────────────────────────────────────
    function goTo(target, back = false) {
        goingBack = back;

        // Hide current
        panels[step].classList.remove('active', 'going-back');

        step = target;

        // Show target with direction class
        const panel = panels[step];
        panel.classList.remove('active', 'going-back');
        if (back) panel.classList.add('going-back');
        // Force reflow, then activate
        void panel.offsetWidth;
        panel.classList.add('active');

        // Scroll content to top
        scrollArea.scrollTop = 0;

        // Update title
        stepTitle.textContent = STEP_TITLES[step];
        stepCounter.textContent = String(step + 1).padStart(2, '0') + ' / ' + String(TOTAL).padStart(2, '0');

        // Dots
        stepDots.forEach((dot, i) => {
            if (i === step) {
                dot.style.width = '24px';
                dot.style.background = 'rgba(255,255,255,0.65)';
            } else if (i < step) {
                dot.style.width = '10px';
                dot.style.background = 'rgba(255,255,255,0.35)';
            } else {
                dot.style.width = '8px';
                dot.style.background = 'rgba(255,255,255,0.13)';
            }
        });

        // Prev button
        if (step === 0) {
            prevBtn.style.opacity = '0';
            prevBtn.style.pointerEvents = 'none';
        } else {
            prevBtn.style.opacity = '1';
            prevBtn.style.pointerEvents = 'auto';
        }

        // Next button label
        if (step === TOTAL - 1) {
            nextBtn.innerHTML = '<iconify-icon icon="lucide:check" width="13"></iconify-icon> Save Profile';
        } else {
            nextBtn.innerHTML = 'Continue <iconify-icon icon="lucide:arrow-right" width="13"></iconify-icon>';
        }
    }

    prevBtn.addEventListener('click', () => { if (step > 0) goTo(step - 1, true); });
    nextBtn.addEventListener('click', () => {
        if (step < TOTAL - 1) {
            goTo(step + 1, false);
        } else {
            saveProfile();
        }
    });

    // ── Chip logic ────────────────────────────────────────────────────
    document.querySelectorAll('.p-chip').forEach(btn => {
        const group   = btn.dataset.group;
        const val     = btn.dataset.val;
        const isMulti = btn.hasAttribute('data-multi');
        const maxSel  = isMulti ? parseInt(btn.dataset.multi, 10) : 1;

        if (!multiSets[group]) multiSets[group] = new Set();

        btn.addEventListener('click', () => {
            if (isMulti) {
                if (multiSets[group].has(val)) {
                    multiSets[group].delete(val);
                    btn.classList.remove('p-active');
                } else {
                    if (maxSel > 1 && multiSets[group].size >= maxSel) return;
                    multiSets[group].add(val);
                    btn.classList.add('p-active');
                }
            } else {
                // single-select within group
                document.querySelectorAll(`.p-chip[data-group="${group}"]`).forEach(b => {
                    b.classList.remove('p-active');
                    multiSets[group].clear();
                });
                multiSets[group].add(val);
                btn.classList.add('p-active');
            }
        });
    });

    // ── Slider: Sleep ─────────────────────────────────────────────────
    const sleepSlider = document.getElementById('p-sleep');
    const sleepDisp   = document.getElementById('p-sleep-disp');
    sleepSlider.addEventListener('input', () => {
        sleepDisp.textContent = sleepSlider.value + ' / 10';
    });

    // ── Slider: Rhythm ────────────────────────────────────────────────
    const rhythmSlider = document.getElementById('p-rhythm');
    const rhythmDisp   = document.getElementById('p-rhythm-disp');
    const RHYTHM_LABELS = { 1: 'Slow & Soothing', 2: 'Mostly Slow', 3: 'Balanced', 4: 'Mostly Fast', 5: 'Fast & Activating' };
    rhythmSlider.addEventListener('input', () => {
        rhythmDisp.textContent = RHYTHM_LABELS[+rhythmSlider.value];
    });

    // ── Save ──────────────────────────────────────────────────────────
    function saveProfile() {
        const data = {
            name:        document.getElementById('p-name').value.trim(),
            age:         document.getElementById('p-age').value,
            gender:      [...(multiSets['gender'] || [])][0] || '',
            contact:     document.getElementById('p-contact').value.trim(),
            hearing:     [...(multiSets['hearing'] || [])][0] || '',
            conditions:  [...(multiSets['conditions'] || [])],
            medication:  [...(multiSets['medication'] || [])][0] || '',
            sleep:       +sleepSlider.value,
            medsNote:    document.getElementById('p-meds-note').value.trim(),
            emotions:    [...(multiSets['emotions'] || [])],
            goals:       [...(multiSets['goals'] || [])],
            fluctuation: [...(multiSets['fluctuation'] || [])],
            styles:      [...(multiSets['styles'] || [])],
            sensitive:   document.getElementById('p-sensitive').value.trim(),
            rhythm:      +rhythmSlider.value,
            volume:      [...(multiSets['volume'] || [])][0] || '',
            prevTherapy: [...(multiSets['prevTherapy'] || [])][0] || '',
            therapyTypes:[...(multiSets['therapyTypes'] || [])],
            sessions:    [...(multiSets['sessions'] || [])][0] || '',
            effectiveness:[...(multiSets['effectiveness'] || [])][0] || '',
            notes:       document.getElementById('p-notes').value.trim(),
            savedAt:     new Date().toISOString(),
        };

        try {
            localStorage.setItem('moodtune-profile', JSON.stringify(data));
        } catch (_) {}

        // Update header button
        if (data.name) btnLabel.textContent = data.name;
        savedDot.classList.remove('hidden');

        closeModal();
        showToast('Profile saved');
    }

    // ── Toast notification ────────────────────────────────────────────
    function showToast(msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:9rem;left:50%;transform:translateX(-50%);z-index:200;' +
            'animation:toast-in 0.4s cubic-bezier(0.16,1,0.3,1) both;' +
            'background:rgba(15,15,18,0.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);' +
            'border:1px solid rgba(255,255,255,0.14);border-radius:9999px;' +
            'padding:0.6rem 1.4rem;display:flex;align-items:center;gap:0.5rem;' +
            'color:rgba(255,255,255,0.75);font-size:0.7rem;letter-spacing:0.1em;font-family:Outfit,sans-serif;';
        t.innerHTML = '<iconify-icon icon="lucide:check-circle-2" width="14" style="color:rgba(255,255,255,0.5)"></iconify-icon> ' + msg;
        document.body.appendChild(t);
        setTimeout(() => {
            t.style.animation = 'toast-out 0.35s ease forwards';
            setTimeout(() => t.remove(), 380);
        }, 2300);
    }

    // ── Restore saved data on load ────────────────────────────────────
    function loadProfile() {
        let data;
        try { data = JSON.parse(localStorage.getItem('moodtune-profile') || '{}'); }
        catch (_) { return; }
        if (!data.savedAt) return;

        // Text fields
        if (data.name)     { document.getElementById('p-name').value    = data.name;    btnLabel.textContent = data.name; savedDot.classList.remove('hidden'); }
        if (data.age)      document.getElementById('p-age').value       = data.age;
        if (data.contact)  document.getElementById('p-contact').value   = data.contact;
        if (data.medsNote) document.getElementById('p-meds-note').value = data.medsNote;
        if (data.sensitive)document.getElementById('p-sensitive').value  = data.sensitive;
        if (data.notes)    document.getElementById('p-notes').value     = data.notes;

        if (data.sleep) {
            sleepSlider.value       = data.sleep;
            sleepDisp.textContent   = data.sleep + ' / 10';
        }
        if (data.rhythm) {
            rhythmSlider.value      = data.rhythm;
            rhythmDisp.textContent  = RHYTHM_LABELS[data.rhythm] || 'Balanced';
        }

        // Chips — restore active states
        const SINGLE_GROUPS = ['gender', 'hearing', 'medication', 'volume', 'prevTherapy', 'sessions', 'effectiveness'];
        const MULTI_KEYS = {
            conditions:   data.conditions,
            emotions:     data.emotions,
            goals:        data.goals,
            fluctuation:  data.fluctuation,
            styles:       data.styles,
            therapyTypes: data.therapyTypes,
        };

        SINGLE_GROUPS.forEach(g => {
            const v = data[g];
            if (!v) return;
            const btn = document.querySelector(`.p-chip[data-group="${g}"][data-val="${v}"]`);
            if (btn) { btn.classList.add('p-active'); if (!multiSets[g]) multiSets[g] = new Set(); multiSets[g].add(v); }
        });

        Object.entries(MULTI_KEYS).forEach(([g, vals]) => {
            if (!Array.isArray(vals)) return;
            if (!multiSets[g]) multiSets[g] = new Set();
            vals.forEach(v => {
                multiSets[g].add(v);
                const btn = document.querySelector(`.p-chip[data-group="${g}"][data-val="${v}"]`);
                if (btn) btn.classList.add('p-active');
            });
        });
    }

    // ── Init ──────────────────────────────────────────────────────────
    loadProfile();
    goTo(0);

})();
</script>
</body>
</html>
