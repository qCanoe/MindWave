<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodTune - Ethereal Therapy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 15, 18, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow-accent: rgba(180, 198, 218, 0.4);
        }
        
        body {
            background-color: #030305;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .font-display {
            font-family: 'Cormorant Garamond', serif;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .glass-nav {
            background: linear-gradient(to bottom, rgba(3, 3, 5, 0.8) 0%, rgba(3, 3, 5, 0) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        /* Organic Animations */
        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }

        @keyframes stagger-up {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .animate-stagger-1 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both; }
        .animate-stagger-2 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both; }
        .animate-stagger-3 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both; }
        .animate-stagger-4 { animation: stagger-up 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both; }

        @keyframes wave-bounce {
            0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        /* Gramophone Visualizer */
        .gramophone-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));
        }

        /* Glow effects */
        .gramophone-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 198, 218, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulse-glow 4s ease-in-out infinite alternate;
        }

        .gramophone-aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            animation: record-spin 20s linear infinite reverse;
            pointer-events: none;
        }

        /* Vinyl Record */
        .gramophone-record {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(
                    circle,
                    #14151a 0,
                    #14151a 2px,
                    #1f2129 3px,
                    #1f2129 4px
                );
            box-shadow: 
                inset 0 0 20px rgba(0, 0, 0, 0.8),
                0 10px 30px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(255, 255, 255, 0.05);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: record-spin 4s linear infinite;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 5;
        }

        /* Vinyl Light Reflection */
        .gramophone-record::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255, 255, 255, 0.05) 45deg,
                transparent 90deg,
                transparent 180deg,
                rgba(255, 255, 255, 0.05) 225deg,
                transparent 270deg,
                transparent 360deg
            );
            pointer-events: none;
        }

        /* Record Label / Center */
        .record-label {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4b5263, #2a2e38);
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .record-hole {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #030305;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Floating Notes */
        .music-note {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            z-index: 15;
            animation: float-note 4s ease-out infinite;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        .note-1 { top: 40%; left: 20%; animation-delay: 0s; font-size: 1.1rem; }
        .note-2 { top: 60%; left: 30%; animation-delay: 1.5s; font-size: 1.4rem; }
        .note-3 { top: 25%; left: 60%; animation-delay: 2.5s; font-size: 0.9rem; }

        /* Tonearm Container */
        .tonearm-container {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 40px;
            height: 140px;
            z-index: 10;
            transform-origin: 20px 20px;
            animation: arm-bob 6s ease-in-out infinite alternate;
            transform: rotate(12deg);
        }

        .tonearm-base {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f8fafc, #94a3b8);
            box-shadow: 
                0 4px 10px rgba(0,0,0,0.5),
                inset 0 0 0 2px rgba(255,255,255,0.2);
            z-index: 2;
        }

        .tonearm-base::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #1e293b;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }

        /* The Stick */
        .tonearm-arm {
            position: absolute;
            top: 20px;
            left: 17px;
            width: 6px;
            height: 110px;
            background: linear-gradient(to right, #cbd5e1, #64748b);
            border-radius: 3px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.4);
            transform-origin: top center;
            transform: rotate(25deg);
        }

        /* Stylus Head */
        .stylus-head {
            position: absolute;
            bottom: -8px;
            left: -6px;
            width: 18px;
            height: 28px;
            background: linear-gradient(135deg, #e2e8f0, #475569);
            border-radius: 3px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.5);
            transform: rotate(-15deg);
        }

        .stylus-head::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 4px;
            background: #94a3b8;
            border-radius: 1px;
        }

        @keyframes record-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes arm-bob {
            0% { transform: rotate(12deg); }
            50% { transform: rotate(14deg); }
            100% { transform: rotate(10deg); }
        }

        @keyframes float-note {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-40px) scale(1.1) rotate(15deg); opacity: 0; }
        }

        /* Custom Input Styling */
        .ethereal-input {
            background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.2);
        }
        .ethereal-input:focus-within {
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.15), 0 0 25px rgba(180, 198, 218, 0.1);
            border-color: rgba(255,255,255,0.2);
        }
        
        .ethereal-input input {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        
        .ethereal-input input::placeholder {
            text-shadow: none;
        }

        /* Active Chip */
        .chip-active {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
            color: #fff;
        }

        /* Interpreting label */
        @keyframes interp-flash {
            from { opacity: 0; transform: translateX(-8px); filter: blur(4px); }
            to   { opacity: 1; transform: translateX(0);    filter: blur(0);   }
        }
        .interp-flash {
            animation: interp-flash 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        #interpreting-label {
            transition: opacity 0.4s ease;
        }

        /* Player card cross-fade */
        #player-title {
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        #player-subtext {
            transition: opacity 0.22s ease;
        }

        /* Glow tint morph */
        #gramophone-glow {
            transition: background 1.4s ease;
        }

        /* Record pause — !important ensures it beats the animation shorthand in the class rule */
        .record-paused {
            animation-play-state: paused !important;
        }

        /* Regenerate button spin */
        @keyframes regen-spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        .regen-spinning {
            animation: regen-spin 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        /* Progress bar thumb — always visible while dragging */
        #progress-track.dragging #progress-thumb {
            opacity: 1 !important;
        }
        #progress-thumb {
            transition: opacity 0.2s ease, left 0.9s linear;
        }

        /* Pause tonearm and aura ring only — floating notes keep playing */
        .gramophone-paused .tonearm-container,
        .gramophone-paused .gramophone-aura {
            animation-play-state: paused !important;
        }

        /* ── Equalizer Bars ──────────────────────────────────────────────── */
        @keyframes eq-wave {
            0%   { transform: scaleY(var(--eq-min, 0.12)); }
            100% { transform: scaleY(var(--eq-max, 1)); }
        }

        .eq-bar {
            flex: 1;
            min-width: 0;
            border-radius: 2px 2px 1px 1px;
            background: linear-gradient(to top, rgba(255,255,255,0.18), rgba(255,255,255,0.04));
            transform-origin: bottom center;
            animation: eq-wave var(--eq-dur, 1s) var(--eq-delay, 0s) ease-in-out infinite alternate;
            /* only transform/opacity transition — background updates are intentionally instant */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.15, 1),
                        opacity  0.6s ease;
        }

        /* Paused: strip animation so transition takes over → bars melt to near-flat */
        .eq-paused .eq-bar {
            animation: none;
            transform: scaleY(0.07);
            opacity: 0.22;
        }
    </style>
</head>

        <div class="w-full h-full relative">
            <div class="aura-background-component top-0 w-full absolute h-full opacity-80">

    <!-- Header -->
    <header class="w-full z-50 glass-nav transition-all duration-300 flex-shrink-0 absolute top-0">
        <div class="max-w-6xl mx-auto px-8 h-20 flex items-center justify-between">
            <a href="#" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center bg-white/5 backdrop-blur-md group-hover:bg-white/10 transition-all duration-500">
                    <iconify-icon icon="lucide:waves" class="text-white/80 group-hover:text-white" width="16"></iconify-icon>
                </div>
                <span class="text-xl font-medium tracking-wide text-white/90 font-display italic">MoodTune</span>

            <button class="text-xs font-light px-5 py-2.5 rounded-full border transition-all duration-300 bg-transparent border-white/10 text-white/50 hover:border-white/30 hover:text-white flex items-center gap-2">
                <iconify-icon icon="lucide:rotate-ccw" width="12"></iconify-icon>
                Reset Aura
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto w-full relative z-10 flex flex-col items-center pt-32 pb-48 px-6">
        
        <!-- Intent Input Area -->
        <div class="w-full max-w-2xl mb-16 flex flex-col gap-6">
            <h1 class="font-display text-4xl md:text-5xl text-center mb-4 font-medium text-white/90 tracking-wide animate-stagger-1">
                How are you feeling <i class="text-white/50">today?</i>
            </h1>
            
            <div class="relative flex items-center group w-full ethereal-input rounded-full border border-white/10 transition-all duration-500 animate-stagger-2">
                <input type="text" placeholder="e.g., anxious, need focus, can't sleep..." 
                       class="w-full bg-transparent py-5 pl-8 pr-32 text-white/90 placeholder:text-white/30 focus:outline-none text-lg font-normal tracking-wide caret-white selection:bg-white/20">
                <button class="absolute right-3 h-10 px-6 rounded-full bg-white/10 text-white text-sm font-medium hover:bg-white/20 transition-all flex items-center gap-2 backdrop-blur-md border border-white/5 hover:scale-105">
                    <iconify-icon icon="lucide:sparkles" width="16"></iconify-icon>
                    Tune
                </button>
            </div>

            <!-- Chips -->
            <div class="flex flex-col gap-5 mt-4 animate-stagger-3 w-full">
                <!-- Row 1 -->
                <div class="flex items-center justify-center gap-3 flex-wrap">
                    <span class="text-[10px] text-white/30 uppercase tracking-[0.3em] font-medium mr-2">Mode</span>
                    <button data-mode="focus" class="mode-chip px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">Deep Focus</button>
                    <button data-mode="calm"  class="mode-chip px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">Calm Down</button>
                    <button data-mode="sleep" class="mode-chip px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">Drift to Sleep</button>
                </div>
                <!-- Row 2 -->
                <div class="flex items-center justify-center gap-3 flex-wrap">
                    <span class="text-[10px] text-white/30 uppercase tracking-[0.3em] font-medium mr-2">Vibe</span>
                    <button data-vibe="anxious"    class="vibe-chip px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">Anxious</button>
                    <button data-vibe="overwhelmed" class="vibe-chip px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">Overwhelmed</button>
                    <button data-vibe="creative"   class="vibe-chip px-5 py-2 rounded-full text-xs font-light tracking-wider border border-white/5 bg-transparent text-white/50 hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">Creative Flow</button>
                </div>
            </div>

            <!-- Interpreting Label -->
            <div id="interpreting-label" class="flex items-center justify-center gap-2 mt-1 overflow-hidden" style="opacity:0">
                <span class="text-[10px] text-white/25 uppercase tracking-[0.3em] font-medium flex-shrink-0">Interpreting as</span>
                <span id="interpreting-text" class="text-[11px] text-white/60 font-light tracking-wide"></span>
            </div>
        </div>

        <!-- Player Card -->
        <div class="w-full max-w-lg relative group animate-stagger-4">
            <div class="relative glass-panel rounded-[2.5rem] p-10 flex flex-col items-center">
                <!-- Top Bar -->
                <div class="w-full flex justify-between items-start mb-8">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-white/40 uppercase tracking-[0.3em] font-medium mb-2">Now Resonating</span>
                        <h2 id="player-title" class="text-3xl text-white flex items-center gap-3 font-display italic tracking-wide">
                            Deep Focus
                        </h2>
                    </div>
                    <button id="regen-btn" class="w-10 h-10 rounded-full border border-white/10 bg-white/5 flex items-center justify-center text-white/50 hover:text-white hover:bg-white/10 transition-all duration-500">
                        <iconify-icon id="regen-icon" icon="lucide:refresh-cw" width="16"></iconify-icon>
                    </button>
                </div>

                <!-- Minimalist Gramophone Visualizer -->
                <div id="gramophone-container" class="gramophone-container">
                    <!-- Glows -->
                    <div id="gramophone-glow" class="gramophone-glow"></div>
                    <div class="gramophone-aura"></div>
                    
                    <!-- Vinyl Record -->
                    <div id="gramophone-record" class="gramophone-record">
                        <div class="record-label">
                            <div class="record-hole"></div>
                        </div>
                    </div>

                    <!-- Floating Notes -->
                    <div class="music-note note-1"><iconify-icon icon="lucide:music"></iconify-icon></div>
                    <div class="music-note note-2"><iconify-icon icon="lucide:music-2"></iconify-icon></div>
                    <div class="music-note note-3"><iconify-icon icon="lucide:music"></iconify-icon></div>

                    <!-- Tonearm Structure -->
                    <div class="tonearm-container">
                        <div class="tonearm-base"></div>
                        <div class="tonearm-arm">
                            <div class="stylus-head"></div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex items-center justify-center gap-10 mb-10 w-full">
                    <button id="restart-btn" class="text-white/40 hover:text-white transition-colors hover:scale-110 duration-300">
                        <iconify-icon icon="lucide:skip-back" width="24"></iconify-icon>
                    </button>
                    <button id="play-btn" class="w-20 h-20 rounded-full bg-white/10 border border-white/20 text-white flex items-center justify-center hover:bg-white/20 transition-all duration-300 shadow-[0_0_30px_rgba(255,255,255,0.05)] hover:shadow-[0_0_40px_rgba(255,255,255,0.15)] backdrop-blur-md group">
                        <iconify-icon id="play-icon" icon="lucide:pause" width="28" class="group-hover:scale-95 transition-transform"></iconify-icon>
                    </button>
                    <button class="text-white/40 hover:text-white transition-colors hover:scale-110 duration-300">
                        <iconify-icon icon="lucide:skip-forward" width="24"></iconify-icon>
                    </button>
                </div>

                <!-- Progress — waveform bars span the full track width -->
                <div class="w-full flex flex-col gap-3">
                    <div id="progress-track" class="relative w-full cursor-pointer select-none group/progress" style="height:44px">
                        <!-- Bars injected by JS; they ARE the progress indicator -->
                        <div id="eq-bars" class="absolute inset-0 flex items-end" style="gap:2px"></div>
                        <!-- Vertical playhead cursor -->
                        <div id="progress-thumb" class="absolute top-0 bottom-0 w-px bg-white/55 shadow-[0_0_8px_rgba(255,255,255,0.75)] opacity-0 group-hover/progress:opacity-100 pointer-events-none -translate-x-1/2" style="left:33.3%"></div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span id="time-elapsed" class="text-xs font-mono text-white/30">15:00</span>
                        <span id="player-subtext" class="text-[10px] text-white/40 font-light tracking-widest uppercase">Binaural · 40Hz</span>
                        <span id="time-total" class="text-xs font-mono text-white/30">45:00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Controls Drawer (Floating Island) -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex justify-center pointer-events-none w-full max-w-2xl px-6">
        <div class="pointer-events-auto glass-panel rounded-3xl w-full overflow-hidden transition-all duration-500 group hover:bg-white/[0.05] border border-white/10 hover:border-white/20 shadow-2xl">
            
            <!-- Collapsed View -->
            <div class="px-8 py-5 flex items-center justify-between cursor-pointer">
                <div class="flex items-center gap-6 text-sm font-light text-white/60">
                    <iconify-icon icon="lucide:sliders-horizontal" width="18" class="text-white/40"></iconify-icon>
                    <span class="flex items-center gap-2">Intensity <span id="summary-intensity" class="text-white font-medium">Medium</span></span>
                    <span class="w-1 h-1 rounded-full bg-white/20"></span>
                    <span id="summary-duration" class="text-white font-medium">45 min</span>
                    <span class="w-1 h-1 rounded-full bg-white/20"></span>
                    <span id="summary-env" class="text-white font-medium">Rain</span>
                </div>
                <iconify-icon icon="lucide:chevron-up" width="20" class="text-white/40 group-hover:text-white transition-all group-hover:rotate-180 duration-500"></iconify-icon>
            </div>
            
            <!-- Expanded View -->
            <div class="max-h-0 group-hover:max-h-64 opacity-0 group-hover:opacity-100 transition-all duration-700 ease-in-out">
                <div class="px-8 pb-8 pt-2 border-t border-white/5 flex flex-col md:flex-row gap-10 mt-2">
                    
                    <!-- Intensity -->
                    <div class="flex-1">
                        <div class="text-[10px] text-white/30 uppercase tracking-[0.2em] font-medium mb-5">Intensity</div>
                        <div class="flex justify-between items-center gap-2">
                            <button data-intensity="1" class="intensity-btn w-8 h-8 rounded-full border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">1</button>
                            <div class="h-px flex-1 bg-white/5"></div>
                            <button data-intensity="2" class="intensity-btn w-8 h-8 rounded-full border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">2</button>
                            <div class="h-px flex-1 bg-white/5"></div>
                            <button data-intensity="3" class="intensity-btn w-8 h-8 rounded-full border border-white/20 bg-white/10 text-white text-xs shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-all cursor-pointer select-none">3</button>
                            <div class="h-px flex-1 bg-white/5"></div>
                            <button data-intensity="4" class="intensity-btn w-8 h-8 rounded-full border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">4</button>
                        </div>
                    </div>
                    
                    <!-- Duration -->
                    <div class="flex-1">
                        <div class="text-[10px] text-white/30 uppercase tracking-[0.2em] font-medium mb-5">Duration</div>
                        <div class="flex gap-2">
                            <button data-duration="15"  class="duration-btn flex-1 py-2 rounded-xl border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">15m</button>
                            <button data-duration="30"  class="duration-btn flex-1 py-2 rounded-xl border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">30m</button>
                            <button data-duration="45"  class="duration-btn flex-1 py-2 rounded-xl border border-white/20 bg-white/10 text-white text-xs shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-all cursor-pointer select-none">45m</button>
                        </div>
                    </div>

                    <!-- Environment -->
                    <div class="flex-1">
                        <div class="text-[10px] text-white/30 uppercase tracking-[0.2em] font-medium mb-5">Environment</div>
                        <div class="flex gap-2">
                            <button data-env="None"  class="env-btn flex-1 py-2 rounded-xl border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">None</button>
                            <button data-env="Rain"  class="env-btn flex-1 py-2 rounded-xl border border-white/20 bg-white/10 text-white text-xs shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-all cursor-pointer select-none">Rain</button>
                            <button data-env="Noise" class="env-btn flex-1 py-2 rounded-xl border border-white/5 bg-transparent text-white/40 text-xs hover:border-white/20 hover:text-white transition-all cursor-pointer select-none">Noise</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
(function () {
    'use strict';

    // ── Mode configuration ────────────────────────────────────────────────
    const MODES = {
        focus: {
            title:          'Deep Focus',
            subtext:        'Binaural · 40Hz',
            interpretation: 'Focus · Structured · High density · 40Hz',
            recordSpeed:    '3.5s',
            glowColor:      'rgba(180, 198, 218, 0.22)',
        },
        calm: {
            title:          'Soft Calm',
            subtext:        'Theta · 6Hz',
            interpretation: 'Calm · Warm · Slow · Low density',
            recordSpeed:    '9s',
            glowColor:      'rgba(251, 191, 36, 0.16)',
        },
        sleep: {
            title:          'Sleep Drift',
            subtext:        'Delta · 2Hz',
            interpretation: 'Sleep · Soft · Delta wave · Fade-out',
            recordSpeed:    '18s',
            glowColor:      'rgba(139, 92, 246, 0.2)',
        },
    };

    const VIBE_LABELS = {
        anxious:    'Grounding',
        overwhelmed:'Decompression',
        creative:   'Generative flow',
    };

    // Speed multiplier per mode — higher = slower / more hypnotic
    const EQ_SPEED_FACTOR = { focus: 0.62, calm: 1.45, sleep: 3.20 };

    // Tailwind class sets for chips (all classes must already exist in DOM so CDN generates them)
    const ON  = ['border-white/20', 'bg-white/10', 'text-white', 'shadow-[0_0_15px_rgba(255,255,255,0.05)]'];
    const OFF = ['border-white/5',  'bg-transparent', 'text-white/50', 'hover:border-white/20', 'hover:text-white'];

    // Drawer button active/inactive (same visual logic, slightly different shadow value)
    const D_ON  = ['border-white/20', 'bg-white/10', 'text-white', 'shadow-[0_0_10px_rgba(255,255,255,0.1)]'];
    const D_OFF = ['border-white/5',  'bg-transparent', 'text-white/40', 'hover:border-white/20', 'hover:text-white'];

    // ── State ─────────────────────────────────────────────────────────────
    let currentMode      = 'focus';
    let selectedVibes    = new Set(['creative']);
    let isPlaying        = true;
    let elapsedSec       = 15 * 60;   // start at 15 min
    let totalSec         = 45 * 60;   // mutable — updated by Duration picker
    let currentIntensity = 3;
    let currentDuration  = 45;        // minutes
    let currentEnv       = 'Rain';
    let ticker           = null;

    const INTENSITY_LABELS = { 1: 'Light', 2: 'Gentle', 3: 'Medium', 4: 'Strong' };

    // ── DOM refs ──────────────────────────────────────────────────────────
    const gramophoneContainer = document.getElementById('gramophone-container');
    const record        = document.getElementById('gramophone-record');
    const glow          = document.getElementById('gramophone-glow');
    const playerTitle   = document.getElementById('player-title');
    const playerSubtext = document.getElementById('player-subtext');
    const progressTrack = document.getElementById('progress-track');
    const progressThumb = document.getElementById('progress-thumb');
    const timeElapsed   = document.getElementById('time-elapsed');
    const restartBtn       = document.getElementById('restart-btn');
    const regenBtn         = document.getElementById('regen-btn');
    const regenIcon        = document.getElementById('regen-icon');
    const timeTotal        = document.getElementById('time-total');
    const summaryIntensity = document.getElementById('summary-intensity');
    const summaryDuration  = document.getElementById('summary-duration');
    const summaryEnv       = document.getElementById('summary-env');
    const playBtn       = document.getElementById('play-btn');
    const playIcon      = document.getElementById('play-icon');
    const interpLabel   = document.getElementById('interpreting-label');
    const interpText    = document.getElementById('interpreting-text');
    const eqBars        = document.getElementById('eq-bars');
    let   eqBarEls      = [];   // populated by waveform generation below

    // ── EQ speed update ───────────────────────────────────────────────────
    // Scales each bar's animation-duration by the mode-specific factor so
    // Focus feels quick/energetic, Calm gentle, Sleep barely breathing.
    function updateEqSpeed(mode) {
        const factor = EQ_SPEED_FACTOR[mode] ?? 1;
        eqBarEls.forEach(bar => {
            bar.style.animationDuration = (parseFloat(bar.dataset.baseDur) * factor).toFixed(3) + 's';
        });
    }

    // ── Helpers ───────────────────────────────────────────────────────────
    function fmt(sec) {
        return String(Math.floor(sec / 60)).padStart(2, '0') + ':' +
               String(sec % 60).padStart(2, '0');
    }

    // Colour waveform bars (played = bright, unplayed = dim) and move playhead cursor
    function updateProgressVisuals(sec) {
        const pct         = (sec / totalSec) * 100;
        const playedCount = Math.round((sec / totalSec) * eqBarEls.length);
        eqBarEls.forEach((bar, i) => {
            bar.style.background = i < playedCount
                ? 'linear-gradient(to top, rgba(255,255,255,0.72), rgba(255,255,255,0.24))'
                : 'linear-gradient(to top, rgba(255,255,255,0.18), rgba(255,255,255,0.04))';
        });
        progressThumb.style.left = pct + '%';
        timeElapsed.textContent  = fmt(sec);
    }

    function setChipActive(btn, on) {
        if (on) {
            OFF.forEach(c => btn.classList.remove(c));
            ON.forEach(c  => btn.classList.add(c));
        } else {
            ON.forEach(c  => btn.classList.remove(c));
            OFF.forEach(c => btn.classList.add(c));
        }
    }

    function flashInterpText() {
        interpText.classList.remove('interp-flash');
        void interpText.offsetWidth;            // reflow to restart animation
        interpText.classList.add('interp-flash');
    }

    function refreshInterpretation() {
        const cfg = MODES[currentMode];
        const baseParts = cfg ? cfg.interpretation.split(' · ') : [];
        const vibeParts = [...selectedVibes].map(v => VIBE_LABELS[v]).filter(Boolean);
        const all = [...baseParts, ...vibeParts];

        if (all.length === 0) {
            interpLabel.style.opacity = '0';
            return;
        }
        interpText.textContent    = all.join(' · ');
        interpLabel.style.opacity = '1';
        flashInterpText();
    }

    // ── Player Card state ─────────────────────────────────────────────────
    function applyMode(mode) {
        const cfg = MODES[mode];
        if (!cfg) return;

        // Title cross-fade
        playerTitle.style.opacity   = '0';
        playerTitle.style.transform = 'translateY(5px)';
        setTimeout(() => {
            playerTitle.textContent     = cfg.title;
            playerTitle.style.opacity   = '1';
            playerTitle.style.transform = 'translateY(0)';
        }, 220);

        // Subtext cross-fade
        playerSubtext.style.opacity = '0';
        setTimeout(() => {
            playerSubtext.textContent   = cfg.subtext;
            playerSubtext.style.opacity = '1';
        }, 270);

        // Record rotation speed (only when playing)
        if (isPlaying) record.style.animationDuration = cfg.recordSpeed;

        // Glow color morph (CSS transition handles smoothness)
        glow.style.background = `radial-gradient(circle, ${cfg.glowColor} 0%, transparent 70%)`;

        // Adjust EQ bounce tempo to match the new mode's frequency feel
        updateEqSpeed(mode);
    }

    // ── Smooth progress reset ─────────────────────────────────────────────
    function resetProgressAnimated() {
        const EASE    = 'cubic-bezier(0.4, 0, 0.15, 1)';
        const DUR     = '0.45s';
        const RESTORE = 550;

        progressThumb.style.transition = `opacity 0.2s ease, left ${DUR} ${EASE}`;
        updateProgressVisuals(0);

        setTimeout(() => {
            progressThumb.style.transition = 'opacity 0.2s ease, left 0.9s linear';
        }, RESTORE);
    }

    // ── Playback ──────────────────────────────────────────────────────────
    function startTicker() {
        if (ticker) return;
        ticker = setInterval(() => {
            if (elapsedSec >= totalSec) { setPlaying(false); return; }
            elapsedSec++;
            updateProgressVisuals(elapsedSec);
        }, 1000);
    }

    function stopTicker() {
        clearInterval(ticker);
        ticker = null;
    }

    function setPlaying(on) {
        isPlaying = on;
        if (on) {
            playIcon.setAttribute('icon', 'lucide:pause');
            record.classList.remove('record-paused');
            gramophoneContainer.classList.remove('gramophone-paused');
            record.style.animationDuration = MODES[currentMode]?.recordSpeed ?? '4s';
            document.title = '▶ Playing… · MoodTune';
            // Resume EQ bars: remove paused class so CSS animation re-engages
            eqBars.classList.remove('eq-paused');
            startTicker();
        } else {
            playIcon.setAttribute('icon', 'lucide:play');
            record.classList.add('record-paused');
            gramophoneContainer.classList.add('gramophone-paused');
            document.title = 'MoodTune - Ethereal Therapy';
            // Dissipate EQ bars: strip animation, transition handles smooth melt-down
            eqBars.classList.add('eq-paused');
            stopTicker();
        }
    }

    // ── Mode chips ────────────────────────────────────────────────────────
    document.querySelectorAll('.mode-chip').forEach(btn => {
        btn.addEventListener('click', () => {
            const mode = btn.dataset.mode;
            if (currentMode === mode) return;
            document.querySelectorAll('.mode-chip').forEach(b => setChipActive(b, false));
            setChipActive(btn, true);
            currentMode = mode;
            applyMode(mode);
            refreshInterpretation();
        });
    });

    // ── Vibe chips ────────────────────────────────────────────────────────
    document.querySelectorAll('.vibe-chip').forEach(btn => {
        btn.addEventListener('click', () => {
            const vibe = btn.dataset.vibe;
            if (selectedVibes.has(vibe)) {
                selectedVibes.delete(vibe);
                setChipActive(btn, false);
            } else {
                if (selectedVibes.size >= 3) return;   // max 3 vibes
                selectedVibes.add(vibe);
                setChipActive(btn, true);
            }
            refreshInterpretation();
        });
    });

    // ── Progress bar drag ─────────────────────────────────────────────────
    let isDragging = false;

    function clientXFromEvent(e) {
        return e.touches ? e.touches[0].clientX : e.clientX;
    }

    function scrubTo(e) {
        const rect = progressTrack.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (clientXFromEvent(e) - rect.left) / rect.width));
        elapsedSec = Math.round(pct * totalSec);
        updateProgressVisuals(elapsedSec);
    }

    function onDragStart(e) {
        isDragging = true;
        progressThumb.style.transition = 'opacity 0.2s ease, left 0s';
        progressTrack.classList.add('dragging');
        scrubTo(e);
        e.preventDefault();
    }

    function onDragMove(e) {
        if (!isDragging) return;
        scrubTo(e);
    }

    function onDragEnd() {
        if (!isDragging) return;
        isDragging = false;
        progressThumb.style.transition = 'opacity 0.2s ease, left 0.9s linear';
        progressTrack.classList.remove('dragging');
    }

    progressTrack.addEventListener('mousedown',  onDragStart);
    progressTrack.addEventListener('touchstart', onDragStart, { passive: false });
    window.addEventListener('mousemove',  onDragMove);
    window.addEventListener('touchmove',  onDragMove, { passive: false });
    window.addEventListener('mouseup',    onDragEnd);
    window.addEventListener('touchend',   onDragEnd);

    // ── Drawer helpers ────────────────────────────────────────────────────
    function setDrawerActive(btn, on) {
        if (on) {
            D_OFF.forEach(c => btn.classList.remove(c));
            D_ON.forEach(c  => btn.classList.add(c));
        } else {
            D_ON.forEach(c  => btn.classList.remove(c));
            D_OFF.forEach(c => btn.classList.add(c));
        }
    }

    // ── Intensity ─────────────────────────────────────────────────────────
    document.querySelectorAll('.intensity-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const val = +btn.dataset.intensity;
            if (currentIntensity === val) return;
            document.querySelectorAll('.intensity-btn').forEach(b => setDrawerActive(b, false));
            setDrawerActive(btn, true);
            currentIntensity = val;
            summaryIntensity.textContent = INTENSITY_LABELS[val];
        });
    });

    // ── Duration ──────────────────────────────────────────────────────────
    document.querySelectorAll('.duration-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const mins = +btn.dataset.duration;
            if (currentDuration === mins) return;
            document.querySelectorAll('.duration-btn').forEach(b => setDrawerActive(b, false));
            setDrawerActive(btn, true);
            currentDuration = mins;
            totalSec = mins * 60;

            // Clamp elapsed if it now exceeds the new total
            if (elapsedSec > totalSec) {
                elapsedSec = totalSec;
                updateProgressVisuals(elapsedSec);
            } else {
                // Re-render fill/thumb ratio for new total
                updateProgressVisuals(elapsedSec);
            }

            timeTotal.textContent        = `${String(mins).padStart(2,'0')}:00`;
            summaryDuration.textContent  = `${mins} min`;
        });
    });

    // ── Environment ───────────────────────────────────────────────────────
    document.querySelectorAll('.env-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const env = btn.dataset.env;
            if (currentEnv === env) return;
            document.querySelectorAll('.env-btn').forEach(b => setDrawerActive(b, false));
            setDrawerActive(btn, true);
            currentEnv = env;
            summaryEnv.textContent = env;
        });
    });

    // ── Restart (skip-back) — reset to 00:00 and resume ──────────────────
    restartBtn.addEventListener('click', () => {
        elapsedSec = 0;
        resetProgressAnimated();
        if (!isPlaying) setPlaying(true);
    });

    // ── Regenerate — cycle to next mode preset with spin animation ────────
    const MODE_KEYS = Object.keys(MODES);   // ['focus', 'calm', 'sleep']

    regenBtn.addEventListener('click', () => {
        // Spin the icon
        regenIcon.classList.remove('regen-spinning');
        void regenIcon.offsetWidth;
        regenIcon.classList.add('regen-spinning');

        // Cycle to next mode
        const nextMode = MODE_KEYS[(MODE_KEYS.indexOf(currentMode) + 1) % MODE_KEYS.length];
        document.querySelectorAll('.mode-chip').forEach(b => setChipActive(b, b.dataset.mode === nextMode));
        currentMode = nextMode;
        applyMode(nextMode);
        refreshInterpretation();

        // Reset progress for new session
        elapsedSec = 0;
        resetProgressAnimated();
        if (!isPlaying) setPlaying(true);
    });

    // ── Play / Pause ──────────────────────────────────────────────────────
    playBtn.addEventListener('click', () => setPlaying(!isPlaying));

    // ── Generate waveform bars ────────────────────────────────────────────
    // 52 height values that form a realistic-looking audio waveform shape
    const WAVEFORM = [
        .30,.48,.75,.58,.85,.68,.40,.62,.80,.52,
        .70,.90,.62,.80,.48,.72,.98,.60,.35,.70,
        .46,.82,.56,.92,.74,.50,.38,.65,.83,.72,
        .90,.52,.75,.60,.84,.49,.67,.91,.58,.42,
        .69,.51,.79,.65,.93,.55,.38,.61,.76,.52,.36,.46
    ];
    WAVEFORM.forEach((h, i) => {
        const bar   = document.createElement('div');
        bar.className = 'eq-bar';
        const dur   = (0.55 + h * 0.75).toFixed(2);    // taller bars slightly slower
        const delay = ((i % 9) * 0.055).toFixed(3);     // staggered phase offset
        bar.dataset.baseDur = dur;                        // stored for updateEqSpeed
        bar.style.cssText   = `height:${(h * 100).toFixed(1)}%;` +
                              `--eq-min:${(h * 0.50).toFixed(2)};` +
                              `--eq-max:${Math.min(h * 1.12, 1).toFixed(2)};` +
                              `--eq-dur:${dur}s;--eq-delay:${delay}s;`;
        eqBars.appendChild(bar);
        eqBarEls.push(bar);
    });

    // ── Init ──────────────────────────────────────────────────────────────
    // Sync chip visuals with initial JS state
    document.querySelectorAll('.mode-chip').forEach(b =>
        setChipActive(b, b.dataset.mode === currentMode));
    document.querySelectorAll('.vibe-chip').forEach(b =>
        setChipActive(b, selectedVibes.has(b.dataset.vibe)));

    // Apply initial mode to card and interpretation label
    applyMode(currentMode);
    refreshInterpretation();

    // Sync initial progress visuals (fill + thumb + time label)
    updateProgressVisuals(elapsedSec);

    // Sync drawer initial state with JS state
    document.querySelectorAll('.intensity-btn').forEach(b =>
        setDrawerActive(b, +b.dataset.intensity === currentIntensity));
    document.querySelectorAll('.duration-btn').forEach(b =>
        setDrawerActive(b, +b.dataset.duration === currentDuration));
    document.querySelectorAll('.env-btn').forEach(b =>
        setDrawerActive(b, b.dataset.env === currentEnv));

    // Kick off auto-play
    record.style.animationDuration = MODES[currentMode].recordSpeed;
    updateEqSpeed(currentMode);   // sync EQ tempo with initial mode
    startTicker();
    document.title = '▶ Playing… · MoodTune';
})();
</script>
</body>
</html>
